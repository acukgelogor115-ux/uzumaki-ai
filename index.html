<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aira AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background: #060606;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── Header (UI Glass Hitam) ── */
        header {
            width: 100%;
            max-width: 700px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* Tombol Menu 2 Garis Panjang di Kiri */
        .menu-btn {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 10px;
            cursor: pointer;
            padding: 0;
        }

        .menu-btn .bar {
            width: 100%;
            height: 2px;
            background-color: #ffffff;
            border-radius: 2px;
            transition: background-color 0.2s;
        }

        .menu-btn:hover .bar {
            background-color: #aaaaaa;
        }

        /* Judul Tepat di Tengah */
        .header-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
        }

        .header-title h1 {
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            margin: 0;
            letter-spacing: 0.5px;
        }

        /* Wadah Tombol Aksi Kanan */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon-btn {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            color: #ccc;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        /* ── Menu & History Containers ── */
        .menu-container, .history-container { position: relative; }

        .menu-dropdown, .history-dropdown {
            display: none;
            position: absolute;
            top: 44px;
            background: rgba(10, 10, 10, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            min-width: 270px;
            box-shadow: 0 16px 50px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 100;
        }

        .menu-dropdown { left: 0; }
        .history-dropdown { right: 0; max-height: 320px; overflow-y: auto; min-width: 280px; }

        .menu-dropdown.show, .history-dropdown.show {
            display: block;
            animation: fadeDown 0.2s ease;
        }

        @keyframes fadeDown {
            from { opacity:0; transform:translateY(-8px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .menu-section {
            padding: 14px 16px 6px;
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 600;
        }

        .menu-inner {
            padding: 4px 14px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-inner select,
        .menu-inner input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #ccc;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .menu-inner select option { background: #111; }
        .menu-inner select:focus,
        .menu-inner input:focus   { border-color: rgba(255, 255, 255, 0.25); }
        .menu-inner input::placeholder { color: #444; }

        .menu-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            margin: 4px 14px;
        }

        .menu-inner button {
            width: 100%;
            padding: 11px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .menu-inner button:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .api-badge {
            padding: 7px 10px;
            border-radius: 8px;
            font-size: 11px;
            display: none;
            text-align: center;
        }

        .api-badge.ok  { background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.15); color: #fff; }
        .api-badge.err { background: rgba(255, 82, 82, 0.07);  border: 1px solid rgba(255, 82, 82, 0.15);  color: #ff5252; }

        /* ── History List Style ── */
        .history-list {
            padding: 6px 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.09);
        }

        .history-item.active {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .history-text {
            color: #ddd;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            padding-right: 10px;
        }

        .history-del {
            background: none;
            border: none;
            color: #ff5252;
            cursor: pointer;
            font-size: 12px;
            padding: 2px 6px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .history-del:hover { opacity: 1; }
        .no-history { text-align: center; color: #444; font-size: 12px; padding: 20px 0; }

        /* ── Chat area ── */
        .chat-area {
            flex: 1;
            width: 100%;
            max-width: 700px;
            padding: 20px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            height: calc(100vh - 130px);
        }

        .welcome {
            text-align: center;
            margin: auto;
            padding: 30px 20px;
        }

        .welcome h3 { color: #fff; font-size: 19px; font-weight: 700; margin-bottom: 8px; }
        .welcome p  { color: #666; font-size: 13px; line-height: 1.7; }

        /* Bubbles */
        .msg-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .msg-row.user { justify-content: flex-end; }
        .msg-row.ai   { justify-content: flex-start; }

        .ai-icon {
            width: 28px; height: 28px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            flex-shrink: 0;
        }

        .bubble {
            max-width: 75%;
            padding: 11px 15px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.65;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .bubble img {
            max-width: 100%;
            border-radius: 12px;
            margin-bottom: 8px;
            display: block;
        }

        .bubble.user {
            background: rgba(255, 255, 255, 0.06);
            color: #ddd;
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .bubble.ai {
            background: rgba(255, 255, 255, 0.03);
            color: #ccc;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Typing */
        .typing-row { display: flex; gap: 10px; align-items: flex-end; }

        .typing {
            display: flex;
            gap: 5px;
            padding: 13px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .typing span {
            width: 7px; height: 7px;
            background: #ffffff;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing span:nth-child(2) { animation-delay: .2s; }
        .typing span:nth-child(3) { animation-delay: .4s; }

        @keyframes bounce {
            0%,60%,100%{transform:translateY(0)}
            30%{transform:translateY(-7px)}
        }

        /* ── Input container & Area ── */
        .input-container {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            background: rgba(10, 10, 10, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .preview-area {
            display: none;
            padding: 10px 16px;
            position: relative;
            background: rgba(0,0,0,0.3);
        }

        .preview-area img {
            max-height: 90px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .preview-close {
            position: absolute;
            top: 5px;
            left: 100px;
            background: #ff5252;
            border: none;
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 11px;
            line-height: 20px;
            text-align: center;
        }

        .input-area {
            width: 100%;
            padding: 10px 14px 16px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        .input-area textarea {
            flex: 1;
            padding: 11px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 22px;
            color: #ddd;
            font-size: 14px;
            resize: none;
            outline: none;
            max-height: 120px;
            line-height: 1.5;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .input-area textarea:focus { border-color: rgba(255, 255, 255, 0.2); }
        .input-area textarea::placeholder { color: #333; }

        /* Action Plus Button Menu */
        .action-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .plus-btn {
            width: 42px; height: 42px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            color: #ccc;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .plus-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .action-menu {
            display: none;
            position: absolute;
            bottom: 52px;
            left: 0;
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            min-width: 160px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
            z-index: 60;
            overflow: hidden;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .action-menu.show { display: block; }

        .action-menu div {
            padding: 11px 14px;
            color: #ddd;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .action-menu div:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .send-btn {
            width: 42px; height: 42px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .send-btn:hover    { transform: scale(1.05); background: rgba(255, 255, 255, 0.15); }
        .send-btn:disabled { opacity: .3; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>

<header>
    <!-- Kiri: Wadah Menu Utama dengan Tombol 2 Garis -->
    <div class="menu-container">
        <button class="menu-btn" onclick="toggleMenu()" title="Pengaturan AI">
            <span class="bar"></span>
            <span class="bar"></span>
        </button>
        <div class="menu-dropdown" id="menuDropdown">

            <div class="menu-section">Pilih AI & Versi</div>
            <div class="menu-inner">
              <select id="aiProvider" onchange="onProviderChange()">
                <option value="gemini">Milky AI</option>
                  <option value="groq">Way AI</option>
                    <option value="meta">Alpha AI</option>
                  </select>

                <select id="modelVersion" onchange="saveVersion()">
                    <option value="fast">Cepat — respons kilat</option>
                    <option value="deep">Mendalam — analisis detail</option>
                    <option value="think">Berfikir — penalaran panjang</option>
                    <option value="task">Tugas — bantu PR & pekerjaan</option>
                </select>
            </div>

            <div class="menu-divider"></div>

            <div class="menu-section">API Key</div>
            <div class="menu-inner">
                <input type="password" id="apiKeyInput" placeholder="Masukkan API key...">
                <button onclick="saveApiKey()">Simpan</button>
                <div class="api-badge" id="apiBadge"></div>
            </div>

        </div>
    </div>

    <!-- Tengah: Judul Aplikasi -->
    <div class="header-title">
        <h1>Aira AI</h1>
    </div>

    <!-- Kanan: Tombol Sesi Baru & Riwayat Chat -->
    <div class="header-actions">
        <button class="icon-btn" onclick="newChat()" title="Percakapan Baru">Baru</button>

        <div class="history-container">
            <button class="icon-btn" onclick="toggleHistory()" title="Riwayat Sesi">Riwayat</button>
            <div class="history-dropdown" id="historyDropdown">
                <div class="menu-section">Riwayat Chat</div>
                <div class="history-list" id="historyList"></div>
            </div>
        </div>
    </div>
</header>

<div class="chat-area" id="chatArea">
    <div class="welcome">
        <h3>Aira AI</h3>
        <p>Ketuk menu di pojok kiri atas<br>untuk pilih AI, versi, dan masukkan API key!</p>
    </div>
</div>

<div class="input-container">
    <div class="preview-area" id="previewArea">
        <img src="" id="imgPreviewTarget" alt="Upload Preview">
        <button class="preview-close" onclick="clearImageUpload()">x</button>
    </div>

    <div class="input-area">
        <div class="action-wrapper">
            <button class="plus-btn" onclick="toggleActionMenu(event)">+</button>
            <div class="action-menu" id="actionMenu">
                <div onclick="triggerImageFile()">Kirim Foto</div>
                <div onclick="triggerTextToPhoto()">Buat Foto</div>
            </div>
        </div>
        
        <input type="file" id="hiddenFileInput" accept="image/*" style="display:none;" onchange="onFileSelected(this)">

        <textarea id="msgInput" placeholder="Ketik pesan..." rows="1"
            oninput="autoResize(this)"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}">
        </textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">></button>
    </div>
</div>

    let chatHistory      = [];
    let isLoading        = false;
    let currentSessionId = localStorage.getItem('aira_active_session') || '';
    let sessions         = JSON.parse(localStorage.getItem('aira_sessions')) || [];
    
    let uploadedImageBase64 = '';
    let uploadedImageMime   = '';

    const savedProvider = localStorage.getItem('aira_provider') || 'gemini';
    const savedVersion  = localStorage.getItem('aira_version')  || 'fast';
    const savedKey      = localStorage.getItem('aira_key_' + savedProvider) || '';

    document.getElementById('aiProvider').value   = savedProvider;
    document.getElementById('modelVersion').value = savedVersion;

    if (savedKey) {
        document.getElementById('apiKeyInput').value = savedKey;
        showBadge(true, getProviderName(savedProvider) + ' aktif');
    }

    if (!currentSessionId || !getSessionById(currentSessionId)) {
        createNewSession();
    } else {
        loadSession(currentSessionId);
    }
    renderHistoryList();

    document.addEventListener('click', function(e) {
        const menu = document.getElementById('menuDropdown');
        const hist = document.getElementById('historyDropdown');
        const act  = document.getElementById('actionMenu');
        
        if (!e.target.closest('.menu-container')) menu.classList.remove('show');
        if (!e.target.closest('.history-container')) hist.classList.remove('show');
        if (!e.target.closest('.action-wrapper')) act.classList.remove('show');
    });

    function toggleMenu() { document.getElementById('menuDropdown').classList.toggle('show'); }
    function toggleHistory() { document.getElementById('historyDropdown').classList.toggle('show'); }
    function toggleActionMenu(e) { e.stopPropagation(); document.getElementById('actionMenu').classList.toggle('show'); }

    function onProviderChange() {
        const p = document.getElementById('aiProvider').value;
        const key = localStorage.getItem('aira_key_' + p) || '';
        document.getElementById('apiKeyInput').value = key;
        localStorage.setItem('aira_provider', p);
        if (key) showBadge(true, getProviderName(p) + ' aktif');
        else     hideBadge();
    }

    function saveVersion() {
        localStorage.setItem('aira_version', document.getElementById('modelVersion').value);
    }

    function getProviderName(p) {
        return { gemini:'Gemini', groq:'Groq', meta:'Meta AI' }[p] || p;
    }

    function saveApiKey() {
        const provider = document.getElementById('aiProvider').value;
        const key      = document.getElementById('apiKeyInput').value.trim();
        if (!key) { showBadge(false, 'API key kosong!'); return; }
        localStorage.setItem('aira_provider', provider);
        localStorage.setItem('aira_key_' + provider, key);
        showBadge(true, getProviderName(provider) + ' tersimpan!');
        setTimeout(function() { document.getElementById('menuDropdown').classList.remove('show'); }, 700);
    }

    function showBadge(ok, text) {
        const el = document.getElementById('apiBadge');
        el.textContent  = text;
        el.className    = 'api-badge ' + (ok ? 'ok' : 'err');
        el.style.display = 'block';
    }

    function hideBadge() { document.getElementById('apiBadge').style.display = 'none'; }

    function getSessionById(id) {
        for (let i = 0; i < sessions.length; i++) {
            if (sessions[i].id === id) return sessions[i];
        }
        return null;
    }

    function createNewSession() {
        currentSessionId = 'sess_' + Date.now();
        localStorage.setItem('aira_active_session', currentSessionId);
        const newSess = { id: currentSessionId, title: 'Percakapan Baru', history: [] };
        sessions.unshift(newSess);
        localStorage.setItem('aira_sessions', JSON.stringify(sessions));
        chatHistory = [];
        showWelcomeScreen();
        renderHistoryList();
    }

    function newChat() {
        createNewSession();
        clearImageUpload();
    }

    function loadSession(id) {
        currentSessionId = id;
        localStorage.setItem('aira_active_session', currentSessionId);
        const sess = getSessionById(id);
        if (sess) {
            chatHistory = sess.history;
            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML = '';
            if (chatHistory.length === 0) {
                showWelcomeScreen();
            } else {
                for (let i = 0; i < chatHistory.length; i++) {
                    renderBubbleDOM(
                        chatHistory[i].role === 'assistant' ? 'ai' : 'user', 
                        chatHistory[i].content,
                        chatHistory[i].image || null,
                        chatHistory[i].generatedPhotoUrl || null
                    );
                }
            }
        }
        renderHistoryList();
        clearImageUpload();
    }

    function deleteSession(id, event) {
        if (event) event.stopPropagation();
        sessions = sessions.filter(function(s) { return s.id !== id; });
        localStorage.setItem('aira_sessions', JSON.stringify(sessions));
        if (currentSessionId === id) {
            if (sessions.length > 0) loadSession(sessions[0].id);
            else createNewSession();
        } else {
            renderHistoryList();
        }
    }

    function saveActiveHistoryToMemory() {
        const sess = getSessionById(currentSessionId);
        if (sess) {
            sess.history = chatHistory;
            if (chatHistory.length > 0 && sess.title === 'Percakapan Baru') {
                let firstUserText = '';
                for (let i = 0; i < chatHistory.length; i++) {
                    if (chatHistory[i].role === 'user') { firstUserText = chatHistory[i].content; break; }
                }
                if (!firstUserText) firstUserText = "Kirim / Buat Foto";
                sess.title = firstUserText.substring(0, 22) + (firstUserText.length > 22 ? '...' : '');
            }
            localStorage.setItem('aira_sessions', JSON.stringify(sessions));
            renderHistoryList();
        }
    }

    function renderHistoryList() {
        const listEl = document.getElementById('historyList');
        if (!listEl) return;
        listEl.innerHTML = '';
        if (sessions.length === 0) {
            listEl.innerHTML = '<div class="no-history">Tidak ada riwayat chat</div>';
            return;
        }
        for (let i = 0; i < sessions.length; i++) {
            const s = sessions[i];
            const item = document.createElement('div');
            item.className = 'history-item' + (s.id === currentSessionId ? ' active' : '');
            item.setAttribute('onclick', "loadSession('" + s.id + "')");

            const txt = document.createElement('span');
            txt.className = 'history-text';
            txt.textContent = s.title;

            const del = document.createElement('button');
            del.className = 'history-del';
            del.textContent = 'Hapus';
            del.setAttribute('onclick', "deleteSession('" + s.id + "', event)");

            item.appendChild(txt);
            item.appendChild(del);
            listEl.appendChild(item);
        }
    }

    function showWelcomeScreen() {
        document.getElementById('chatArea').innerHTML = `
            <div class="welcome">
                <h3>Aira AI</h3>
                <p>Ketuk menu di pojok kiri atas<br>untuk pilih AI, versi, dan masukkan API key!</p>
            </div>`;
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function triggerImageFile() {
        document.getElementById('hiddenFileInput').click();
        document.getElementById('actionMenu').classList.remove('show');
    }

    function onFileSelected(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            uploadedImageBase64 = e.target.result.split(',')[1];
            uploadedImageMime   = file.type;
            
            document.getElementById('imgPreviewTarget').src = e.target.result;
            document.getElementById('previewArea').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    function clearImageUpload() {
        uploadedImageBase64 = '';
        uploadedImageMime   = '';
        document.getElementById('hiddenFileInput').value = '';
        document.getElementById('previewArea').style.display = 'none';
    }

    function triggerTextToPhoto() {
        document.getElementById('actionMenu').classList.remove('show');
        const promptText = prompt("Masukkan deskripsi foto (prompt) yang ingin dihasilkan:");
        if (!promptText || !promptText.trim()) return;

        const chatArea = document.getElementById('chatArea');
        const welcome  = chatArea.querySelector('.welcome');
        if (welcome) welcome.remove();

        const displayPrompt = "Hasilkan foto: " + promptText;
        renderBubbleDOM('user', displayPrompt, null, null);
        
        chatHistory.push({ role: 'user', content: displayPrompt });
        saveActiveHistoryToMemory();

        showTyping();

        const generatedUrl = 'https://image.pollinations.ai/p/' + encodeURIComponent(promptText.trim()) + '?width=800&height=800&nologo=true';

        setTimeout(function() {
            removeTyping();
            renderBubbleDOM('ai', 'Berikut adalah foto hasil kreativitas Aira untuk Anda:', null, generatedUrl);
            
            chatHistory.push({ 
                role: 'assistant', 
                content: 'Berikut adalah foto hasil kreativitas Aira untuk Anda:', 
                generatedPhotoUrl: generatedUrl 
            });
            saveActiveHistoryToMemory();
        }, 1200);
    }

    function renderBubbleDOM(role, text, imageData, generatedImageUrl) {
        const chatArea = document.getElementById('chatArea');
        const welcome  = chatArea.querySelector('.welcome');
        if (welcome) welcome.remove();

        const row = document.createElement('div');
        row.className = 'msg-row ' + role;

        if (role === 'ai') {
            const icon = document.createElement('div');
            icon.className   = 'ai-icon';
            icon.textContent = 'A';
            row.appendChild(icon);
        }

        const bubble = document.createElement('div');
        bubble.className = 'bubble ' + role;

        if (imageData) {
            const img = document.createElement('img');
            img.src = 'data:' + imageData.mime + ';base64,' + imageData.data;
            bubble.appendChild(img);
        }

        if (generatedImageUrl) {
            const img = document.createElement('img');
            img.src = generatedImageUrl;
            bubble.appendChild(img);
        }

        if (text) {
            const txtNode = document.createElement('span');
            txtNode.textContent = text;
            bubble.appendChild(txtNode);
        }

        row.appendChild(bubble);
        chatArea.appendChild(row);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function showTyping() {
        const chatArea = document.getElementById('chatArea');
        const row = document.createElement('div');
        row.className = 'typing-row';
        row.id = 'typingRow';

        const icon = document.createElement('div');
        icon.className   = 'ai-icon';
        icon.textContent = 'A';

        const dots = document.createElement('div');
        dots.className = 'typing';
        dots.innerHTML = '<span></span><span></span><span></span>';

        row.appendChild(icon);
        row.appendChild(dots);
        chatArea.appendChild(row);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeTyping() {
        const el = document.getElementById('typingRow');
        if (el) el.remove();
    }

    async function sendMessage() {
        if (isLoading) return;

        const provider = document.getElementById('aiProvider').value;
        const version  = document.getElementById('modelVersion').value;
        const apiKey   = localStorage.getItem('aira_key_' + provider) || '';

        if (!apiKey) {
            document.getElementById('menuDropdown').classList.add('show');
            return;
        }

        const input = document.getElementById('msgInput');
        const msg   = input.value.trim();
        
        if (!msg && !uploadedImageBase64) return;

        input.value        = '';
        input.style.height = 'auto';

        let imageObj = null;
        if (uploadedImageBase64) {
            imageObj = { mime: uploadedImageMime, data: uploadedImageBase64 };
        }

        renderBubbleDOM('user', msg, imageObj, null);
        
        chatHistory.push({ role: 'user', content: msg, image: imageObj });
        saveActiveHistoryToMemory();

        isLoading = true;
        document.getElementById('sendBtn').disabled = true;
        showTyping();

        const systemPrompt = SYSTEM_PROMPTS[version];
        const model        = MODELS[provider][version];

        const processingImage = imageObj;
        clearImageUpload();

        try {
            let reply = '';
            if (provider === 'gemini') {
                reply = await callGemini(apiKey, model, systemPrompt);
            } else if (provider === 'groq') {
                if (processingImage) {
                    throw new Error("Model Groq saat ini belum dioptimalkan untuk memproses input gambar langsung secara client-side. Silakan gunakan penyedia Gemini untuk Vision Mode.");
                }
                reply = await callGroq(apiKey, model, systemPrompt);
            } else if (provider === 'meta') {
                if (processingImage) {
                    throw new Error("Model Meta AI saat ini belum dioptimalkan untuk memproses input gambar langsung secara client-side. Silakan gunakan penyedia Gemini untuk Vision Mode.");
                }
                reply = await callMeta(apiKey, model, systemPrompt);
            }
            removeTyping();
            renderBubbleDOM('ai', reply, null, null);
            chatHistory.push({ role: 'assistant', content: reply });
            saveActiveHistoryToMemory();
        } catch (err) {
            removeTyping();
            renderBubbleDOM('ai', err.message, null, null);
        } finally {
            isLoading = false;
            document.getElementById('sendBtn').disabled = false;
        }
    }

    async function callGemini(apiKey, model, systemPrompt) {
        const contents = chatHistory.map(function(m) {
            let parts = [];
            if (m.image) {
                parts.push({
                    inline_data: {
                        mime_type: m.image.mime,
                        data: m.image.data
                    }
                });
            }
            parts.push({ text: m.content || "" });
            return { role: m.role === 'assistant' ? 'model' : 'user', parts: parts };
        });

        const res = await fetch(
            'https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + apiKey,
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    system_instruction: { parts: [{ text: systemPrompt }] },
                    contents: contents,
                    tools: [{ google_search: {} }]
                })
            }
        );
        
        const contentType = res.headers.get("content-type");
        if (!contentType || !contentType.includes("application/json")) {
            throw new Error("Server API mengirimkan respons tidak valid. Silakan periksa kredensial API Key Anda.");
        }

        const data = await res.json();
        if (!res.ok) throw new Error((data.error && data.error.message) || 'Gemini error');
        
        if (data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0]) {
            return data.candidates[0].content.parts[0].text;
        }
        return 'Maaf, Aira tidak menerima respon balik dari server.';
    }

    async function callGroq(apiKey, model, systemPrompt) {
        const textOnlyHistory = chatHistory.map(function(m) {
            return { role: m.role, content: m.content };
        });

        const messages = [{ role: 'system', content: systemPrompt }].concat(textOnlyHistory);
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
            body: JSON.stringify({ model: model, messages: messages })
        });
        
        const contentType = res.headers.get("content-type");
        if (!contentType || !contentType.includes("application/json")) {
            throw new Error("Server API Groq mengirimkan respons tidak valid. Status: " + res.status);
        }

        const data = await res.json();
        if (!res.ok) throw new Error((data.error && data.error.message) || 'Groq error ' + res.status);
        
        if (data && data.choices && data.choices[0] && data.choices[0].message) {
            return data.choices[0].message.content;
        }
        return 'Maaf, Aira tidak menerima respon balik dari server.';
    }

    async function callMeta(apiKey, model, systemPrompt) {
        const textOnlyHistory = chatHistory.map(function(m) {
            return { role: m.role, content: m.content };
        });

        const messages = [{ role: 'system', content: systemPrompt }].concat(textOnlyHistory);
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
            body: JSON.stringify({ model: model, messages: messages })
        });
        
        const contentType = res.headers.get("content-type");
        if (!contentType || !contentType.includes("application/json")) {
            throw new Error("Server API Meta AI mengirimkan respons tidak valid. Status: " + res.status);
        }

        const data = await res.json();
        if (!res.ok) throw new Error((data.error && data.error.message) || 'Meta AI error ' + res.status);
        
        if (data && data.choices && data.choices[0] && data.choices[0].message) {
            return data.choices[0].message.content;
        }
        return 'Maaf, Aira tidak menerima respon balik dari server.';
    }
