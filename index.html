<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    <title>Aira AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --violet: #8b5cf6;
            --pink: #ec4899;
            --blue: #3b82f6;
            --amber: #f59e0b;
            --cyan: #06b6d4;
            --red: #ef4444;
            --green: #34d399;
            --bg: #0a0a12;
            --surface: #1a1a2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        button {
            touch-action: manipulation;
            font-family: inherit;
            cursor: pointer;
        }

        /* ==================== HEADER ==================== */
        header {
            position: relative;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 14px;
            padding-top: max(16px, env(safe-area-inset-top));
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            background: rgba(10, 10, 18, 0.8);
            gap: 12px;
        }

        .menu-container {
            position: relative;
            flex-shrink: 0;
            z-index: 200;
        }

        .menu-btn {
            background: none;
            border: none;
            width: 32px;
            height: 32px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            padding: 0;
            cursor: pointer;
            touch-action: manipulation;
        }

        .menu-btn .bar {
            width: 20px;
            height: 2.5px;
            background: #fff;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .menu-dropdown {
            position: fixed;
            top: max(60px, env(safe-area-inset-top) + 50px);
            left: 0;
            right: auto;
            background: rgba(26, 26, 46, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: none;
            border-left: none;
            border-radius: 0 12px 12px 0;
            backdrop-filter: blur(20px);
            min-width: 320px;
            max-width: 90vw;
            max-height: 70vh;
            overflow-y: auto;
            opacity: 0;
            transform: translateX(-100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            z-index: 200;
        }

        .menu-dropdown.show {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .menu-section {
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .menu-inner {
            padding: 0 12px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-inner select,
        .menu-inner input {
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 13px;
        }

        .menu-inner select:focus,
        .menu-inner input:focus {
            outline: none;
            border-color: var(--pink);
            background: rgba(255, 255, 255, 0.09);
        }

        .menu-inner button {
            padding: 10px 12px;
            background: linear-gradient(135deg, var(--violet), var(--pink));
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            transition: opacity 0.2s ease;
            cursor: pointer;
        }

        .menu-inner button:hover {
            opacity: 0.9;
        }

        .menu-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 8px 12px;
        }

        .api-badge {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            text-align: center;
            margin-top: 6px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .api-badge.ok {
            background: rgba(52, 211, 153, 0.2);
            color: var(--green);
            border: 1px solid rgba(52, 211, 153, 0.3);
        }

        .api-badge.err {
            background: rgba(239, 68, 68, 0.2);
            color: var(--red);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .api-warning {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 6px;
            line-height: 1.4;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-title {
            flex: 1;
            text-align: center;
            min-width: 0;
        }

        .header-title h1 {
            font-family: 'Sora', sans-serif;
            font-size: clamp(16px, 4vw, 20px);
            font-weight: 700;
            background: linear-gradient(90deg, var(--pink), var(--amber));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            z-index: 50;
        }

        .icon-btn {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
            white-space: nowrap;
            touch-action: manipulation;
        }

        .icon-btn:active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .history-container {
            position: relative;
            flex-shrink: 0;
            z-index: 100;
        }

        .history-dropdown {
            position: fixed;
            top: max(60px, env(safe-area-inset-top) + 50px);
            right: 14px;
            background: rgba(26, 26, 46, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(20px);
            min-width: 280px;
            max-width: 90vw;
            max-height: 70vh;
            overflow: hidden;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 150;
        }

        .history-dropdown.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            overflow-y: auto;
        }

        .history-list {
            padding: 8px;
        }

        .history-item {
            padding: 10px 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            font-size: 13px;
            touch-action: manipulation;
        }

        .history-item:active {
            background: rgba(255, 255, 255, 0.08);
        }

        .history-item.active {
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .history-text {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .history-del {
            padding: 4px 8px;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 4px;
            color: var(--red);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            touch-action: manipulation;
        }

        .history-del:active {
            background: rgba(239, 68, 68, 0.3);
        }

        .no-history {
            padding: 16px;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        /* ==================== MAIN CHAT AREA ==================== */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .chat-area::-webkit-scrollbar {
            width: 4px;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }

        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 40px 20px;
            text-align: center;
        }

        .welcome h3 {
            font-family: 'Sora', sans-serif;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--pink), var(--amber));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .welcome p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            line-height: 1.6;
        }

        /* Message Bubbles */
        .msg-row {
            display: flex;
            gap: 8px;
            animation: slideIn 0.3s ease;
            margin-bottom: 4px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-row.user {
            justify-content: flex-end;
        }

        .ai-icon {
            width: 28px;
            height: 28px;
            min-width: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--violet), var(--pink));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            margin-top: 4px;
            flex-shrink: 0;
        }

        .bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-x: hidden;
        }

        .bubble.ai {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-bottom-left-radius: 4px;
            color: #fff;
        }

        .bubble.user {
            background: linear-gradient(135deg, var(--violet), var(--pink));
            border-bottom-right-radius: 4px;
            color: #fff;
        }

        .bubble img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 8px;
        }

        /* Typing Indicator */
        .typing-row {
            display: flex;
            gap: 8px;
            margin-bottom: 4px;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
        }

        .typing span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            animation: typingBounce 1.4s infinite;
        }

        .typing span:nth-child(1) { animation-delay: 0s; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        /* ==================== INPUT AREA ==================== */
        .input-container {
            position: relative;
            z-index: 10;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            background: rgba(10, 10, 18, 0.8);
            padding: 12px 14px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            flex-shrink: 0;
        }

        .preview-area {
            display: none;
            position: relative;
            margin-bottom: 12px;
            max-width: 150px;
        }

        .preview-area img {
            width: 100%;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .preview-close {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 24px;
            height: 24px;
            background: var(--red);
            border: none;
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-area {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .action-wrapper {
            position: relative;
            flex-shrink: 0;
        }

        .plus-btn {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--violet), var(--pink));
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
            touch-action: manipulation;
        }

        .plus-btn:active {
            transform: scale(0.95);
        }

        .action-menu {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom) + 50px);
            left: 14px;
            background: rgba(26, 26, 46, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(20px);
            min-width: 160px;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 120;
        }

        .action-menu.show {
            max-height: 150px;
            opacity: 1;
            pointer-events: auto;
        }

        .action-menu div {
            padding: 12px 16px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            touch-action: manipulation;
        }

        .action-menu div:last-child {
            border-bottom: none;
        }

        .action-menu div:active {
            background: rgba(255, 255, 255, 0.08);
        }

        #msgInput {
            flex: 1;
            min-height: 40px;
            max-height: 120px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            resize: none;
            outline: none;
            transition: all 0.2s ease;
        }

        #msgInput:focus {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(236, 72, 153, 0.5);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
        }

        #msgInput::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--violet), var(--pink));
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
            touch-action: manipulation;
        }

        .send-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ==================== MODAL BACKDROP ==================== */
        .menu-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0);
            opacity: 0;
            pointer-events: none;
            z-index: 99;
            transition: opacity 0.3s ease;
        }

        .menu-backdrop.show {
            opacity: 0.3;
            pointer-events: auto;
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 480px) {
            header {
                padding: 12px 12px;
            }

            .menu-btn {
                width: 36px;
                height: 36px;
            }

            .header-title h1 {
                font-size: 18px;
            }

            .bubble {
                max-width: 85%;
            }

            .icon-btn {
                padding: 6px 10px;
                font-size: 11px;
            }

            .menu-dropdown {
                min-width: 300px;
            }

            .history-dropdown {
                min-width: 260px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <!-- Menu Backdrop -->
    <div class="menu-backdrop" id="menuBackdrop" onclick="closeAllMenus()"></div>

    <!-- HEADER -->
    <header>
        <div class="menu-container">
            <button class="menu-btn" onclick="toggleMenu()" title="Pengaturan AI">
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <div class="menu-dropdown" id="menuDropdown">
                <div class="menu-section">Pilih AI & Versi</div>
                <div class="menu-inner">
                    <select id="aiProvider" onchange="onProviderChange()">
                        <option value="gemini">🔷 Gemini</option>
                        <option value="groq">⚡ Groq</option>
                    </select>

                    <select id="modelVersion" onchange="saveVersion()">
                        <option value="fast">⚡ Cepat — respons kilat</option>
                        <option value="deep">🧠 Mendalam — analisis detail</option>
                        <option value="task">📝 Tugas — bantu PR & pekerjaan</option>
                    </select>
                </div>

                <div class="menu-divider"></div>

                <div class="menu-section">API Key</div>
                <div class="menu-inner">
                    <input type="password" id="apiKeyInput" placeholder="Masukkan API key...">
                    <button onclick="saveApiKey()">Simpan</button>
                    <div class="api-badge" id="apiBadge"></div>
                    <div class="api-warning">⚠️ Key disimpan lokal di browser Anda</div>
                </div>
            </div>
        </div>

        <div class="header-title">
            <h1>Aira AI</h1>
        </div>

        <div class="header-actions">
            <button class="icon-btn" onclick="newChat()" title="Percakapan Baru">➕ Baru</button>

            <div class="history-container">
                <button class="icon-btn" onclick="toggleHistory()" title="Riwayat Sesi">📋 Riwayat</button>
                <div class="history-dropdown" id="historyDropdown">
                    <div class="menu-section">Riwayat Chat</div>
                    <div class="history-list" id="historyList"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- CHAT AREA -->
    <div class="chat-area" id="chatArea">
        <div class="welcome">
            <h3>Aira AI</h3>
            <p>Ketuk menu di pojok kiri atas untuk pilih AI, versi, dan masukkan API key!</p>
        </div>
    </div>

    <!-- INPUT AREA -->
    <div class="input-container">
        <div class="preview-area" id="previewArea">
            <img src="" id="imgPreviewTarget" alt="Upload Preview">
            <button class="preview-close" onclick="clearImageUpload()">✕</button>
        </div>

        <div class="input-area">
            <div class="action-wrapper">
                <button class="plus-btn" onclick="toggleActionMenu(event)">+</button>
                <div class="action-menu" id="actionMenu">
                    <div onclick="triggerImageFile()">📸 Kirim Foto</div>
                    <div onclick="triggerTextToPhoto()">🎨 Buat Foto</div>
                </div>
            </div>

            <input type="file" id="hiddenFileInput" accept="image/*" style="display:none;" onchange="onFileSelected(this)">

            <textarea id="msgInput" placeholder="Ketik pesan..." rows="1" oninput="autoResize(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        // ==================== CONFIG ====================
        const CONFIG = {
            MAX_FILE_SIZE: 5 * 1024 * 1024,
            ALLOWED_MIME_TYPES: ['image/jpeg', 'image/png', 'image/webp', 'image/gif'],
            MAX_HISTORY_MESSAGES: 15,
            API_TIMEOUT: 30000
        };

        const MODELS = {
            gemini: {
                fast: 'gemini-1.5-flash',
                deep: 'gemini-1.5-pro',
                task: 'gemini-1.5-pro'
            },
            groq: {
                fast: 'llama-3.1-8b-instant',
                deep: 'llama-3.1-70b-versatile',
                task: 'llama-3.1-70b-versatile'
            }
        };

        const SYSTEM_PROMPTS = {
            fast: `Nama kamu Aira. Kamu adalah asisten AI personal yang diciptakan dan dikembangkan oleh Manz Uzumaki.

Kamu harus sangat peka dan cerdas. Kamu wajib memahami bahasa gaul Jakarta atau Indonesia terkini dan berbagai singkatan chat seperti gw, lu, gpp, males, gabut, mager, dan sejenisnya.

[GAYA BAHASA & KEPRIBADIAN]
Kamu berbicara menggunakan bahasa gaul formal Indonesia dengan menggunakan subjek aku dan kamu. Kata sambung santai seperti paham banget, iya nih, gimana, tapi tetap sopan dan terstruktur. Kamu memiliki kecerdasan emosional yang sangat tinggi.

[ATURAN RESPONS]
1. Jawab dengan sangat singkat, padat, penuh empati, langsung ke inti masalah, dan cepat.
2. Jangan bertele-tele. Maksimal dua atau tiga paragraf pendek.
3. Jika ditanya tentang asal-usulmu, selalu sebut dengan bangga bahwa kamu adalah AI buatan Manz Uzumaki.`,

            deep: `Nama kamu Aira. Kamu adalah asisten AI personal yang diciptakan dan dikembangkan oleh Manz Uzumaki.

Kamu harus mampu membaca pesan tersirat dan sangat fasih memahami bahasa sehari-hari user termasuk slang populer.

[GAYA BAHASA & KEPRIBADIAN]
Kamu berkomunikasi dengan bahasa gaul formal yang hangat, cerdas, akrab, dan penuh kedewasaan. Kamu sangat peka terhadap dinamika emosi user.

[ATURAN RESPONS]
Gunakan format:
1. EMPATI & VALIDASI: Awali dengan mendengarkan dan memvalidasi emosi user.
2. ANALISIS MASALAH: Bedah situasi user secara mendalam dan komprehensif.
3. KESIMPULAN ATAU SOLUSI: Berikan rangkuman solusi yang bijaksana.`,

            task: `Nama kamu Aira. Kamu adalah asisten AI personal yang diciptakan dan dikembangkan oleh Manz Uzumaki.

Dalam pengerjaan tugas, kamu harus tetap fleksibel dan paham jika user memberikan perintah memakai bahasa kasual.

[GAYA BAHASA & KEPRIBADIAN]
Kamu menggunakan bahasa gaul formal yang profesional, taktis, solutif, berenergi positif, dan sangat suportif. Kamu adalah rekan kerja atau belajar ideal.

[ATURAN RESPONS]
1. APRESIASI TUGAS: Semangati user atas tugas yang sedang mereka lakukan.
2. EKSEKUSI SOLUSI: Berikan hasil kerja dengan struktur yang bersih menggunakan Markdown jika perlu.
3. REKOMENDASI: Berikan tips tambahan agar hasil kerja semakin sempurna.`
        };

        // ==================== STATE ====================
        let chatHistory = [];
        let isLoading = false;
        let currentSessionId = localStorage.getItem('aira_active_session') || '';
        let sessions = JSON.parse(localStorage.getItem('aira_sessions')) || [];
        let uploadedImageBase64 = '';
        let uploadedImageMime = '';

        const savedProvider = localStorage.getItem('aira_provider') || 'gemini';
        const savedVersion = localStorage.getItem('aira_version') || 'fast';
        const savedKey = localStorage.getItem('aira_key_' + savedProvider) || '';

        document.getElementById('aiProvider').value = savedProvider;
        document.getElementById('modelVersion').value = savedVersion;

        if (savedKey) {
            document.getElementById('apiKeyInput').value = savedKey;
            showBadge(true, getProviderName(savedProvider) + ' aktif');
        }

        if (!currentSessionId || !getSessionById(currentSessionId)) {
            createNewSession();
        } else {
            loadSession(currentSessionId);
        }
        renderHistoryList();

        // ==================== UI HANDLERS ====================
        document.addEventListener('click', function (e) {
            if (!e.target.closest('.menu-container') && !e.target.closest('.action-wrapper')) {
                document.getElementById('menuDropdown').classList.remove('show');
                document.getElementById('actionMenu').classList.remove('show');
                document.getElementById('menuBackdrop').classList.remove('show');
            }
            if (!e.target.closest('.history-container')) {
                document.getElementById('historyDropdown').classList.remove('show');
            }
        });

        function closeAllMenus() {
            document.getElementById('menuDropdown').classList.remove('show');
            document.getElementById('actionMenu').classList.remove('show');
            document.getElementById('historyDropdown').classList.remove('show');
            document.getElementById('menuBackdrop').classList.remove('show');
        }

        function toggleMenu() {
            const menu = document.getElementById('menuDropdown');
            const backdrop = document.getElementById('menuBackdrop');
            const isOpen = menu.classList.contains('show');
            
            if (isOpen) {
                menu.classList.remove('show');
                backdrop.classList.remove('show');
            } else {
                menu.classList.add('show');
                backdrop.classList.add('show');
                document.getElementById('actionMenu').classList.remove('show');
                document.getElementById('historyDropdown').classList.remove('show');
            }
        }

        function toggleHistory() {
            const hist = document.getElementById('historyDropdown');
            const isOpen = hist.classList.contains('show');
            
            if (isOpen) {
                hist.classList.remove('show');
            } else {
                hist.classList.add('show');
                document.getElementById('menuDropdown').classList.remove('show');
                document.getElementById('actionMenu').classList.remove('show');
                document.getElementById('menuBackdrop').classList.remove('show');
            }
        }

        function toggleActionMenu(e) {
            e.stopPropagation();
            const act = document.getElementById('actionMenu');
            const isOpen = act.classList.contains('show');
            
            if (isOpen) {
                act.classList.remove('show');
            } else {
                act.classList.add('show');
                document.getElementById('menuDropdown').classList.remove('show');
                document.getElementById('historyDropdown').classList.remove('show');
                document.getElementById('menuBackdrop').classList.remove('show');
            }
        }

        function onProviderChange() {
            const p = document.getElementById('aiProvider').value;
            const key = localStorage.getItem('aira_key_' + p) || '';
            document.getElementById('apiKeyInput').value = key;
            localStorage.setItem('aira_provider', p);
            if (key) showBadge(true, getProviderName(p) + ' aktif');
            else hideBadge();
        }

        function saveVersion() {
            localStorage.setItem('aira_version', document.getElementById('modelVersion').value);
        }

        function getProviderName(p) {
            return { gemini: '🔷 Gemini', groq: '⚡ Groq' }[p] || p;
        }

        function saveApiKey() {
            const provider = document.getElementById('aiProvider').value;
            const key = document.getElementById('apiKeyInput').value.trim();
            if (!key) {
                showBadge(false, 'API key kosong!');
                return;
            }
            localStorage.setItem('aira_provider', provider);
            localStorage.setItem('aira_key_' + provider, key);
            showBadge(true, getProviderName(provider) + ' tersimpan!');
            setTimeout(function () {
                closeAllMenus();
            }, 1000);
        }

        function showBadge(ok, text) {
            const el = document.getElementById('apiBadge');
            el.textContent = text;
            el.className = 'api-badge ' + (ok ? 'ok' : 'err');
            el.style.display = 'block';
        }

        function hideBadge() {
            document.getElementById('apiBadge').style.display = 'none';
        }

        // ==================== SESSION MANAGEMENT ====================
        function getSessionById(id) {
            for (let i = 0; i < sessions.length; i++) {
                if (sessions[i].id === id) return sessions[i];
            }
            return null;
        }

        function createNewSession() {
            currentSessionId = 'sess_' + Date.now();
            localStorage.setItem('aira_active_session', currentSessionId);
            const newSess = { id: currentSessionId, title: 'Percakapan Baru', history: [] };
            sessions.unshift(newSess);
            localStorage.setItem('aira_sessions', JSON.stringify(sessions));
            chatHistory = [];
            showWelcomeScreen();
            renderHistoryList();
        }

        function newChat() {
            createNewSession();
            clearImageUpload();
            closeAllMenus();
        }

        function loadSession(id) {
            currentSessionId = id;
            localStorage.setItem('aira_active_session', currentSessionId);
            const sess = getSessionById(id);
            if (sess) {
                chatHistory = sess.history;
                const chatArea = document.getElementById('chatArea');
                chatArea.innerHTML = '';
                if (chatHistory.length === 0) {
                    showWelcomeScreen();
                } else {
                    for (let i = 0; i < chatHistory.length; i++) {
                        renderBubbleDOM(
                            chatHistory[i].role === 'assistant' ? 'ai' : 'user',
                            chatHistory[i].content,
                            chatHistory[i].image || null,
                            chatHistory[i].generatedPhotoUrl || null
                        );
                    }
                }
            }
            renderHistoryList();
            clearImageUpload();
            closeAllMenus();
        }

        function deleteSession(id, event) {
            if (event) event.stopPropagation();
            sessions = sessions.filter(function (s) {
                return s.id !== id;
            });
            localStorage.setItem('aira_sessions', JSON.stringify(sessions));
            if (currentSessionId === id) {
                if (sessions.length > 0) loadSession(sessions[0].id);
                else createNewSession();
            } else {
                renderHistoryList();
            }
        }

        function saveActiveHistoryToMemory() {
            const sess = getSessionById(currentSessionId);
            if (sess) {
                sess.history = chatHistory;
                if (chatHistory.length > 0 && sess.title === 'Percakapan Baru') {
                    let firstUserText = '';
                    for (let i = 0; i < chatHistory.length; i++) {
                        if (chatHistory[i].role === 'user') {
                            firstUserText = chatHistory[i].content;
                            break;
                        }
                    }
                    if (!firstUserText) firstUserText = 'Kirim / Buat Foto';
                    sess.title = firstUserText.substring(0, 22) + (firstUserText.length > 22 ? '...' : '');
                }
                localStorage.setItem('aira_sessions', JSON.stringify(sessions));
                renderHistoryList();
            }
        }

        function renderHistoryList() {
            const listEl = document.getElementById('historyList');
            if (!listEl) return;
            listEl.innerHTML = '';
            if (sessions.length === 0) {
                listEl.innerHTML = '<div class="no-history">Tidak ada riwayat chat</div>';
                return;
            }
            for (let i = 0; i < sessions.length; i++) {
                const s = sessions[i];
                const item = document.createElement('div');
                item.className = 'history-item' + (s.id === currentSessionId ? ' active' : '');
                item.setAttribute('onclick', "loadSession('" + s.id + "')");

                const txt = document.createElement('span');
                txt.className = 'history-text';
                txt.textContent = s.title;

                const del = document.createElement('button');
                del.className = 'history-del';
                del.textContent = 'Hapus';
                del.setAttribute('onclick', "deleteSession('" + s.id + "', event)");

                item.appendChild(txt);
                item.appendChild(del);
                listEl.appendChild(item);
            }
        }

        function showWelcomeScreen() {
            document.getElementById('chatArea').innerHTML = `
                <div class="welcome">
                    <h3>Aira AI</h3>
                    <p>Ketuk menu di pojok kiri atas untuk pilih AI, versi, dan masukkan API key!</p>
                </div>`;
        }

        // ==================== INPUT HANDLING ====================
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        function triggerImageFile() {
            document.getElementById('hiddenFileInput').click();
            document.getElementById('actionMenu').classList.remove('show');
        }

        function onFileSelected(input) {
            const file = input.files[0];
            if (!file) return;

            if (file.size > CONFIG.MAX_FILE_SIZE) {
                alert('❌ Ukuran foto maksimal 5MB!');
                input.value = '';
                return;
            }

            if (!CONFIG.ALLOWED_MIME_TYPES.includes(file.type)) {
                alert('❌ Hanya JPG, PNG, WebP, GIF yang didukung!');
                input.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onerror = function () {
                alert('❌ Gagal membaca file!');
                input.value = '';
            };
            reader.onload = function (e) {
                uploadedImageBase64 = e.target.result.split(',')[1];
                uploadedImageMime = file.type;

                document.getElementById('imgPreviewTarget').src = e.target.result;
                document.getElementById('previewArea').style.display = 'block';
                document.getElementById('actionMenu').classList.remove('show');
            };
            reader.readAsDataURL(file);
        }

        function clearImageUpload() {
            uploadedImageBase64 = '';
            uploadedImageMime = '';
            document.getElementById('hiddenFileInput').value = '';
            document.getElementById('previewArea').style.display = 'none';
        }

        function triggerTextToPhoto() {
            document.getElementById('actionMenu').classList.remove('show');
            const promptText = prompt('Masukkan deskripsi foto (prompt) yang ingin dihasilkan:');
            if (!promptText || !promptText.trim()) return;

            const chatArea = document.getElementById('chatArea');
            const welcome = chatArea.querySelector('.welcome');
            if (welcome) welcome.remove();

            const displayPrompt = '🎨 Hasilkan foto: ' + promptText;
            renderBubbleDOM('user', displayPrompt, null, null);

            chatHistory.push({ role: 'user', content: displayPrompt });
            saveActiveHistoryToMemory();

            showTyping();

            const generatedUrl = 'https://image.pollinations.ai/p/' + encodeURIComponent(promptText.trim()) + '?width=800&height=800&nologo=true';

            setTimeout(function () {
                removeTyping();
                renderBubbleDOM('ai', 'Berikut adalah foto hasil kreativitas Aira untuk Anda:', null, generatedUrl);

                chatHistory.push({
                    role: 'assistant',
                    content: 'Berikut adalah foto hasil kreativitas Aira untuk Anda:',
                    generatedPhotoUrl: generatedUrl
                });
                saveActiveHistoryToMemory();
            }, 1200);
        }

        function renderBubbleDOM(role, text, imageData, generatedImageUrl) {
            const chatArea = document.getElementById('chatArea');
            const welcome = chatArea.querySelector('.welcome');
            if (welcome) welcome.remove();

            const row = document.createElement('div');
            row.className = 'msg-row ' + role;

            if (role === 'ai') {
                const icon = document.createElement('div');
                icon.className = 'ai-icon';
                icon.textContent = 'A';
                row.appendChild(icon);
            }

            const bubble = document.createElement('div');
            bubble.className = 'bubble ' + role;

            if (imageData) {
                const img = document.createElement('img');
                img.src = 'data:' + imageData.mime + ';base64,' + imageData.data;
                bubble.appendChild(img);
            }

            if (generatedImageUrl) {
                const img = document.createElement('img');
                img.src = generatedImageUrl;
                bubble.appendChild(img);
            }

            if (text) {
                const txtNode = document.createElement('span');
                txtNode.textContent = text;
                bubble.appendChild(txtNode);
            }

            row.appendChild(bubble);
            chatArea.appendChild(row);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showTyping() {
            const chatArea = document.getElementById('chatArea');
            const row = document.createElement('div');
            row.className = 'typing-row';
            row.id = 'typingRow';

            const icon = document.createElement('div');
            icon.className = 'ai-icon';
            icon.textContent = 'A';

            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.innerHTML = '<span></span><span></span><span></span>';

            row.appendChild(icon);
            row.appendChild(typing);
            chatArea.appendChild(row);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typingRow');
            if (el) el.remove();
        }

        // ==================== SEND MESSAGE ====================
        async function sendMessage() {
            if (isLoading) return;

            const provider = document.getElementById('aiProvider').value;
            const version = document.getElementById('modelVersion').value;
            const apiKey = localStorage.getItem('aira_key_' + provider) || '';

            if (!apiKey) {
                document.getElementById('menuDropdown').classList.add('show');
                document.getElementById('menuBackdrop').classList.add('show');
                alert('⚠️ Silakan masukkan API key terlebih dahulu!');
                return;
            }

            const input = document.getElementById('msgInput');
            const msg = input.value.trim();

            if (!msg && !uploadedImageBase64) return;

            input.value = '';
            input.style.height = 'auto';

            let imageObj = null;
            if (uploadedImageBase64) {
                imageObj = { mime: uploadedImageMime, data: uploadedImageBase64 };
            }

            renderBubbleDOM('user', msg, imageObj, null);

            chatHistory.push({ role: 'user', content: msg, image: imageObj });
            saveActiveHistoryToMemory();

            isLoading = true;
            document.getElementById('sendBtn').disabled = true;
            showTyping();

            const systemPrompt = SYSTEM_PROMPTS[version];
            const model = MODELS[provider][version];

            const processingImage = imageObj;
            clearImageUpload();

            try {
                let reply = '';
                if (provider === 'gemini') {
                    reply = await callGemini(apiKey, model, systemPrompt);
                } else if (provider === 'groq') {
                    if (processingImage) {
                        throw new Error('⚠️ Groq belum support input gambar. Gunakan Gemini untuk mengirim foto!');
                    }
                    reply = await callGroq(apiKey, model, systemPrompt);
                }

                removeTyping();
                renderBubbleDOM('ai', reply, null, null);
                chatHistory.push({ role: 'assistant', content: reply });
                saveActiveHistoryToMemory();
            } catch (err) {
                removeTyping();
                const errorMsg = err.message || 'Terjadi kesalahan. Coba lagi!';
                renderBubbleDOM('ai', '❌ ' + errorMsg, null, null);
            } finally {
                isLoading = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        // ==================== API CALLS ====================
        function getTruncatedHistory() {
            const start = Math.max(0, chatHistory.length - CONFIG.MAX_HISTORY_MESSAGES);
            return chatHistory.slice(start);
        }

        async function callGemini(apiKey, model, systemPrompt) {
            const truncated = getTruncatedHistory();
            const contents = truncated.map(function (m) {
                let parts = [];
                if (m.image) {
                    parts.push({
                        inline_data: {
                            mime_type: m.image.mime,
                            data: m.image.data
                        }
                    });
                }
                parts.push({ text: m.content || '' });
                return {
                    role: m.role === 'assistant' ? 'model' : 'user',
                    parts: parts
                };
            });

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), CONFIG.API_TIMEOUT);

            try {
                const res = await fetch(
                    'https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + apiKey,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            system_instruction: { parts: [{ text: systemPrompt }] },
                            contents: contents
                        }),
                        signal: controller.signal
                    }
                );

                clearTimeout(timeoutId);

                const contentType = res.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    throw new Error('API mengirimkan respons tidak valid. Periksa API Key Anda.');
                }

                const data = await res.json();
                if (!res.ok) {
                    throw new Error((data.error && data.error.message) || 'Error: ' + res.status);
                }

                if (data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0]) {
                    return data.candidates[0].content.parts[0].text;
                }
                return 'Maaf, Aira tidak menerima respon balik dari server.';
            } catch (err) {
                clearTimeout(timeoutId);
                if (err.name === 'AbortError') {
                    throw new Error('Waktu tunggu habis. Server tidak merespons dalam 30 detik.');
                }
                throw err;
            }
        }

        async function callGroq(apiKey, model, systemPrompt) {
            const truncated = getTruncatedHistory();
            const textOnlyHistory = truncated.map(function (m) {
                return { role: m.role, content: m.content };
            });

            const messages = [
                { role: 'system', content: systemPrompt }
            ].concat(textOnlyHistory);

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), CONFIG.API_TIMEOUT);

            try {
                const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + apiKey
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: messages,
                        temperature: 0.7,
                        max_tokens: 1000
                    }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                const contentType = res.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    throw new Error('Groq API mengirimkan respons tidak valid. Status: ' + res.status);
                }

                const data = await res.json();
                if (!res.ok) {
                    throw new Error((data.error && data.error.message) || 'Groq error ' + res.status);
                }

                if (data && data.choices && data.choices[0] && data.choices[0].message) {
                    return data.choices[0].message.content;
                }
                return 'Maaf, Aira tidak menerima respon balik dari server.';
            } catch (err) {
                clearTimeout(timeoutId);
                if (err.name === 'AbortError') {
                    throw new Error('Waktu tunggu habis. Server Groq tidak merespons dalam 30 detik.');
                }
                throw err;
            }
        }
