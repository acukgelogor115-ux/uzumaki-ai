<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Aira AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --violet:#8b5cf6; --pink:#ec4899; --blue:#3b82f6; --amber:#f59e0b; --cyan:#06b6d4;
    --bg:#0a0a12;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);}
  body{
    font-family:'Plus Jakarta Sans',sans-serif;
    color:#fff;-webkit-font-smoothing:antialiased;
  }
  button{touch-action:manipulation;font-family:inherit;}

  /* ===================== SPLASH ===================== */
  #splash{
    position:fixed;inset:0;z-index:50;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;cursor:pointer;
    transition:opacity .7s ease, transform .8s cubic-bezier(.4,0,.2,1);
  }
  #splash.exit{opacity:0;transform:scale(1.08);pointer-events:none;}

  .blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:.8;will-change:transform;}
  .blob-1{width:60vmax;height:60vmax;background:radial-gradient(circle,var(--violet),transparent 70%);top:-22%;left:-16%;animation:float1 15s ease-in-out infinite;}
  .blob-2{width:52vmax;height:52vmax;background:radial-gradient(circle,var(--pink),transparent 70%);bottom:-26%;right:-12%;animation:float2 18s ease-in-out infinite;}
  .blob-3{width:46vmax;height:46vmax;background:radial-gradient(circle,var(--blue),transparent 70%);top:8%;right:-22%;animation:float3 17s ease-in-out infinite;}
  .blob-4{width:42vmax;height:42vmax;background:radial-gradient(circle,var(--amber),transparent 70%);bottom:-6%;left:-14%;animation:float1 21s ease-in-out infinite reverse;}
  .blob-5{width:38vmax;height:38vmax;background:radial-gradient(circle,var(--cyan),transparent 70%);top:38%;left:32%;animation:float2 19s ease-in-out infinite reverse;}

  @keyframes float1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(8%,10%) scale(1.15)}}
  @keyframes float2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-10%,-6%) scale(1.1)}}
  @keyframes float3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-6%,9%) scale(1.2)}}

  .blur-layer{
    position:absolute;inset:0;
    background:rgba(10,10,18,.3);
    backdrop-filter:blur(54px);-webkit-backdrop-filter:blur(54px);
    transition:backdrop-filter 1.7s cubic-bezier(.25,.46,.45,.94), -webkit-backdrop-filter 1.7s cubic-bezier(.25,.46,.45,.94), background 1.7s ease;
  }
  #splash.clear .blur-layer{background:rgba(10,10,18,0);backdrop-filter:blur(0px);-webkit-backdrop-filter:blur(0px);}

  .splash-content{position:relative;z-index:2;text-align:center;padding:0 32px;}
  .logo-orb{
    width:60px;height:60px;margin:0 auto 26px;border-radius:50%;
    background:conic-gradient(from 0deg,var(--violet),var(--pink),var(--amber),var(--cyan),var(--violet));
    box-shadow:0 0 44px rgba(139,92,246,.55);
    opacity:0;animation:spin 6s linear infinite, orbIn .8s ease forwards .2s;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes orbIn{to{opacity:1}}

  .welcome-text{font-family:'Sora',sans-serif;font-size:clamp(23px,6.6vw,32px);font-weight:700;line-height:1.4;letter-spacing:-.01em;}
  .welcome-text .word{display:inline-block;opacity:0;transform:translateY(18px) scale(.96);filter:blur(6px);animation:wordIn .7s cubic-bezier(.2,.7,.2,1) forwards;}
  .welcome-text .word.hl{background:linear-gradient(90deg,var(--pink),var(--amber));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .welcome-text .word:nth-child(1){animation-delay:.5s}
  .welcome-text .word:nth-child(2){animation-delay:.62s}
  .welcome-text .word:nth-child(3){animation-delay:.74s}
  .welcome-text .word:nth-child(4){animation-delay:.86s}
  .welcome-text .word:nth-child(5){animation-delay:1.0s}
  .welcome-text .word:nth-child(6){animation-delay:1.14s}
  @keyframes wordIn{to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}

  .splash-hint{margin-top:24px;font-size:13px;color:rgba(255,255,255,.55);opacity:0;animation:hintIn .6s ease forwards 2s;}
  @keyframes hintIn{to{opacity:1}}

  /* ===================== CHAT ===================== */
  #chat{
    position:fixed;inset:0;display:flex;flex-direction:column;
    opacity:0;transform:scale(.97);pointer-events:none;
    transition:opacity .6s ease, transform .6s cubic-bezier(.2,.8,.2,1);
  }
  #chat.active{opacity:1;transform:scale(1);pointer-events:auto;}

  .chat-bg{position:absolute;inset:0;overflow:hidden;z-index:0;}
  .chat-bg .blob{opacity:.6;filter:blur(85px);}
  .chat-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,18,.18) 0%,rgba(10,10,18,.5) 55%,rgba(10,10,18,.85) 100%);}

  .chat-header{
    position:relative;z-index:2;display:flex;align-items:center;gap:10px;
    padding:16px 18px;padding-top:max(16px,env(safe-area-inset-top));
    border-bottom:1px solid rgba(255,255,255,.08);backdrop-filter:blur(20px);
  }
  .header-title{font-family:'Sora',sans-serif;font-weight:700;font-size:16px;}
  .header-sub{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.5);}
  .status-dot{width:6px;height:6px;border-radius:50%;background:#34d399;box-shadow:0 0 6px #34d399;}

  #messages{position:relative;z-index:1;flex:1;overflow-y:auto;padding:20px 16px 8px;display:flex;flex-direction:column;gap:13px;-webkit-overflow-scrolling:touch;}
  #messages::-webkit-scrollbar{width:4px;}
  #messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px;}

  .msg{max-width:78%;padding:12px 16px;border-radius:20px;font-size:14.5px;line-height:1.5;animation:bubbleIn .45s cubic-bezier(.2,.8,.2,1) backwards;}
  @keyframes bubbleIn{from{opacity:0;transform:translateY(10px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
  .msg.user{align-self:flex-end;background:linear-gradient(135deg,var(--violet),var(--pink));border-bottom-right-radius:6px;}
  .msg.ai{align-self:flex-start;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(14px);border-bottom-left-radius:6px;}

  .typing-dots{display:flex;gap:5px;align-items:center;padding:4px 2px;}
  .typing-dots .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.65);animation:bounce 1.1s ease-in-out infinite;}
  .typing-dots .dot:nth-child(2){animation-delay:.15s}
  .typing-dots .dot:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-6px);opacity:1}}
  .typing-dots.collapsing .dot:nth-child(1),.typing-dots.collapsing .dot:nth-child(3){animation:none;transform:scale(0);opacity:0;transition:all .3s ease;}
  .typing-dots.collapsing .dot:nth-child(2){animation:none;transform:scale(1.7);transition:transform .3s ease .08s;}
  .typing-dots.fading{transition:opacity .3s ease;opacity:0;}

  .text-reveal{display:inline-block;opacity:0;clip-path:inset(0 100% 0 0);animation:wipeIn .85s cubic-bezier(.65,0,.35,1) forwards;}
  @keyframes wipeIn{0%{opacity:0;clip-path:inset(0 100% 0 0)}25%{opacity:1}100%{opacity:1;clip-path:inset(0 0% 0 0)}}

  .input-bar{position:relative;z-index:2;display:flex;gap:10px;align-items:center;padding:12px 14px;padding-bottom:max(12px,env(safe-area-inset-bottom));border-top:1px solid rgba(255,255,255,.08);backdrop-filter:blur(20px);}
  .input-wrap{flex:1;display:flex;align-items:center;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:24px;padding:2px 6px 2px 18px;transition:border-color .3s ease, box-shadow .3s ease, background .3s ease;}
  .input-wrap.focused{border-color:rgba(236,72,153,.55);box-shadow:0 0 0 4px rgba(139,92,246,.15), 0 0 18px rgba(236,72,153,.22);background:rgba(255,255,255,.09);}
  #msg-input{flex:1;background:none;border:none;outline:none;color:#fff;font-family:inherit;font-size:16px;padding:10px 0;}
  #msg-input::placeholder{color:rgba(255,255,255,.4);}

  #send-btn{width:40px;height:40px;border-radius:50%;border:none;flex-shrink:0;position:relative;cursor:pointer;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--violet),var(--pink));transition:transform .2s cubic-bezier(.4,0,.2,1);}
  #send-btn:disabled{opacity:.5;cursor:not-allowed;}
  #send-btn:focus-visible{outline:2px solid #fff;outline-offset:3px;}
  #send-btn svg{width:17px;height:17px;transition:transform .3s ease;}
  #send-btn.sending svg{transform:translate(3px,-3px) rotate(20deg);}
  #send-btn.sending{animation:sendPulse .5s ease;}
  @keyframes sendPulse{0%{transform:scale(1)}40%{transform:scale(.85)}100%{transform:scale(1)}}
  #send-btn::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:2px solid var(--pink);opacity:0;transform:scale(.6);}
  #send-btn.sending::after{animation:ripple .6s ease-out;}
  @keyframes ripple{0%{opacity:.7;transform:scale(.6)}100%{opacity:0;transform:scale(1.6)}}

  @media (prefers-reduced-motion: reduce){
    .blob,.logo-orb{animation:none !important;}
    .logo-orb{opacity:1;}
    .welcome-text .word{animation:none !important;opacity:1;transform:none;filter:none;}
    .msg,.text-reveal{animation:none !important;opacity:1;clip-path:none;}
    .typing-dots .dot{animation:none !important;opacity:1;}
  }
</style>
</head>
<body>

<div id="splash">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
  <div class="blob blob-5"></div>
  <div class="blur-layer"></div>
  <div class="splash-content">
    <div class="logo-orb"></div>
    <h1 class="welcome-text">
      <span class="word">Halo,</span>
      <span class="word">Selamat</span>
      <span class="word">Datang</span>
      <span class="word">Di</span>
      <span class="word hl">Aira</span>
      <span class="word hl">AI</span>
    </h1>
    <p class="splash-hint">Ketuk di mana saja untuk mulai</p>
  </div>
</div>

<div id="chat">
  <div class="chat-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
    <div class="blob blob-5"></div>
  </div>
  <header class="chat-header">
    <span class="header-title">Aira AI</span>
    <span class="header-sub"><span class="status-dot"></span>Online</span>
  </header>
  <div id="messages"></div>
  <div class="input-bar">
    <div class="input-wrap" id="input-wrap">
      <input id="msg-input" type="text" placeholder="Ketik pesan..." autocomplete="off">
    </div>
    <button id="send-btn" aria-label="Kirim">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 12L20 4L14 20L11 13L4 12Z" stroke="white" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/></svg>
    </button>
  </div>
</div>

<script>
  const splash = document.getElementById('splash');
  const chat = document.getElementById('chat');
  const messages = document.getElementById('messages');
  const input = document.getElementById('msg-input');
  const inputWrap = document.getElementById('input-wrap');
  const sendBtn = document.getElementById('send-btn');

  let history = [];
  let entered = false;

  function enterChat(){
    if(entered) return;
    entered = true;
    splash.classList.add('exit');
    setTimeout(() => {
      splash.style.display = 'none';
      chat.classList.add('active');
      setTimeout(() => addAIMessage('Halo! Saya Aira 👋 Ada yang bisa aku bantu hari ini?'), 320);
    }, 700);
  }

  setTimeout(() => splash.classList.add('clear'), 300);
  const autoTimer = setTimeout(enterChat, 3600);
  splash.addEventListener('click', () => { clearTimeout(autoTimer); enterChat(); });

  function scrollToBottom(){ messages.scrollTop = messages.scrollHeight; }

  function addUserMessage(text){
    const el = document.createElement('div');
    el.className = 'msg user';
    el.textContent = text;
    messages.appendChild(el);
    scrollToBottom();
  }

  function addAIMessage(text){
    const el = document.createElement('div');
    el.className = 'msg ai';
    const span = document.createElement('span');
    span.className = 'text-reveal';
    span.textContent = text;
    el.appendChild(span);
    messages.appendChild(el);
    scrollToBottom();
  }

  function showTyping(){
    const el = document.createElement('div');
    el.className = 'msg ai';
    el.innerHTML = '<div class="typing-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
    messages.appendChild(el);
    scrollToBottom();
    return el;
  }

  function collapseTyping(bubble, cb){
    const dots = bubble.querySelector('.typing-dots');
    dots.classList.add('collapsing');
    setTimeout(() => {
      dots.classList.add('fading');
      setTimeout(() => { bubble.remove(); cb(); }, 300);
    }, 380);
  }

  async function getAIReply(userText){
    history.push({ role: 'user', content: userText });
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 300,
        system: 'Kamu adalah "Aira AI", asisten AI yang hangat, ramah, dan ringkas. Selalu balas dalam Bahasa Indonesia yang natural dan santai, maksimal 2-3 kalimat pendek.',
        messages: history
      })
    });
    const data = await res.json();
    if(!data.content) throw new Error((data.error && data.error.message) || 'API error');
    const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('').trim();
    history.push({ role: 'assistant', content: text });
    return text || 'Maaf, aku belum bisa memikirkan jawabannya. Coba tanya lagi, ya.';
  }

  async function handleSend(){
    const text = input.value.trim();
    if(!text || sendBtn.disabled) return;
    input.value = '';
    sendBtn.disabled = true;
    sendBtn.classList.add('sending');
    setTimeout(() => sendBtn.classList.remove('sending'), 500);

    addUserMessage(text);
    const bubble = showTyping();
    const start = Date.now();

    let reply;
    try{
      reply = await getAIReply(text);
    }catch(e){
      reply = 'Maaf, koneksi lagi bermasalah. Coba lagi sebentar, ya.';
    }

    const wait = Math.max(0, 900 - (Date.now() - start));
    setTimeout(() => {
      collapseTyping(bubble, () => {
        addAIMessage(reply);
        sendBtn.disabled = false;
      });
    }, wait);
  }

  sendBtn.addEventListener('click', handleSend);
  input.addEventListener('keydown', e => { if(e.key === 'Enter') handleSend(); });
  input.addEventListener('focus', () => inputWrap.classList.add('focused'));
  input.addEventListener('blur', () => inputWrap.classList.remove('focused'));
</script>
</body>
</html>

    let chatHistory      = [];
    let isLoading        = false;
    let currentSessionId = localStorage.getItem('aira_active_session') || '';
    let sessions         = JSON.parse(localStorage.getItem('aira_sessions')) || [];
    
    let uploadedImageBase64 = '';
    let uploadedImageMime   = '';

    const savedProvider = localStorage.getItem('aira_provider') || 'gemini';
    const savedVersion  = localStorage.getItem('aira_version')  || 'fast';
    const savedKey      = localStorage.getItem('aira_key_' + savedProvider) || '';

    document.getElementById('aiProvider').value   = savedProvider;
    document.getElementById('modelVersion').value = savedVersion;

    if (savedKey) {
        document.getElementById('apiKeyInput').value = savedKey;
        showBadge(true, getProviderName(savedProvider) + ' aktif');
    }

    if (!currentSessionId || !getSessionById(currentSessionId)) {
        createNewSession();
    } else {
        loadSession(currentSessionId);
    }
    renderHistoryList();

    document.addEventListener('click', function(e) {
        const menu = document.getElementById('menuDropdown');
        const hist = document.getElementById('historyDropdown');
        const act  = document.getElementById('actionMenu');
        
        if (!e.target.closest('.menu-container')) menu.classList.remove('show');
        if (!e.target.closest('.history-container')) hist.classList.remove('show');
        if (!e.target.closest('.action-wrapper')) act.classList.remove('show');
    });

    function toggleMenu() { document.getElementById('menuDropdown').classList.toggle('show'); }
    function toggleHistory() { document.getElementById('historyDropdown').classList.toggle('show'); }
    function toggleActionMenu(e) { e.stopPropagation(); document.getElementById('actionMenu').classList.toggle('show'); }

    function onProviderChange() {
        const p = document.getElementById('aiProvider').value;
        const key = localStorage.getItem('aira_key_' + p) || '';
        document.getElementById('apiKeyInput').value = key;
        localStorage.setItem('aira_provider', p);
        if (key) showBadge(true, getProviderName(p) + ' aktif');
        else     hideBadge();
    }

    function saveVersion() {
        localStorage.setItem('aira_version', document.getElementById('modelVersion').value);
    }

    function getProviderName(p) {
        return { gemini:'Gemini', groq:'Groq', meta:'Meta AI' }[p] || p;
    }

    function saveApiKey() {
        const provider = document.getElementById('aiProvider').value;
        const key      = document.getElementById('apiKeyInput').value.trim();
        if (!key) { showBadge(false, 'API key kosong!'); return; }
        localStorage.setItem('aira_provider', provider);
        localStorage.setItem('aira_key_' + provider, key);
        showBadge(true, getProviderName(provider) + ' tersimpan!');
        setTimeout(function() { document.getElementById('menuDropdown').classList.remove('show'); }, 700);
    }

    function showBadge(ok, text) {
        const el = document.getElementById('apiBadge');
        el.textContent  = text;
        el.className    = 'api-badge ' + (ok ? 'ok' : 'err');
        el.style.display = 'block';
    }

    function hideBadge() { document.getElementById('apiBadge').style.display = 'none'; }

    function getSessionById(id) {
        for (let i = 0; i < sessions.length; i++) {
            if (sessions[i].id === id) return sessions[i];
        }
        return null;
    }

    function createNewSession() {
        currentSessionId = 'sess_' + Date.now();
        localStorage.setItem('aira_active_session', currentSessionId);
        const newSess = { id: currentSessionId, title: 'Percakapan Baru', history: [] };
        sessions.unshift(newSess);
        localStorage.setItem('aira_sessions', JSON.stringify(sessions));
        chatHistory = [];
        showWelcomeScreen();
        renderHistoryList();
    }

    function newChat() {
        createNewSession();
        clearImageUpload();
    }

    function loadSession(id) {
        currentSessionId = id;
        localStorage.setItem('aira_active_session', currentSessionId);
        const sess = getSessionById(id);
        if (sess) {
            chatHistory = sess.history;
            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML = '';
            if (chatHistory.length === 0) {
                showWelcomeScreen();
            } else {
                for (let i = 0; i < chatHistory.length; i++) {
                    renderBubbleDOM(
                        chatHistory[i].role === 'assistant' ? 'ai' : 'user', 
                        chatHistory[i].content,
                        chatHistory[i].image || null,
                        chatHistory[i].generatedPhotoUrl || null
                    );
                }
            }
        }
        renderHistoryList();
        clearImageUpload();
    }

    function deleteSession(id, event) {
        if (event) event.stopPropagation();
        sessions = sessions.filter(function(s) { return s.id !== id; });
        localStorage.setItem('aira_sessions', JSON.stringify(sessions));
        if (currentSessionId === id) {
            if (sessions.length > 0) loadSession(sessions[0].id);
            else createNewSession();
        } else {
            renderHistoryList();
        }
    }

    function saveActiveHistoryToMemory() {
        const sess = getSessionById(currentSessionId);
        if (sess) {
            sess.history = chatHistory;
            if (chatHistory.length > 0 && sess.title === 'Percakapan Baru') {
                let firstUserText = '';
                for (let i = 0; i < chatHistory.length; i++) {
                    if (chatHistory[i].role === 'user') { firstUserText = chatHistory[i].content; break; }
                }
                if (!firstUserText) firstUserText = "Kirim / Buat Foto";
                sess.title = firstUserText.substring(0, 22) + (firstUserText.length > 22 ? '...' : '');
            }
            localStorage.setItem('aira_sessions', JSON.stringify(sessions));
            renderHistoryList();
        }
    }

    function renderHistoryList() {
        const listEl = document.getElementById('historyList');
        if (!listEl) return;
        listEl.innerHTML = '';
        if (sessions.length === 0) {
            listEl.innerHTML = '<div class="no-history">Tidak ada riwayat chat</div>';
            return;
        }
        for (let i = 0; i < sessions.length; i++) {
            const s = sessions[i];
            const item = document.createElement('div');
            item.className = 'history-item' + (s.id === currentSessionId ? ' active' : '');
            item.setAttribute('onclick', "loadSession('" + s.id + "')");

            const txt = document.createElement('span');
            txt.className = 'history-text';
            txt.textContent = s.title;

            const del = document.createElement('button');
            del.className = 'history-del';
            del.textContent = 'Hapus';
            del.setAttribute('onclick', "deleteSession('" + s.id + "', event)");

            item.appendChild(txt);
            item.appendChild(del);
            listEl.appendChild(item);
        }
    }

    function showWelcomeScreen() {
        document.getElementById('chatArea').innerHTML = `
            <div class="welcome">
                <h3>Aira AI</h3>
                <p>Ketuk menu di pojok kiri atas<br>untuk pilih AI, versi, dan masukkan API key!</p>
            </div>`;
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function triggerImageFile() {
        document.getElementById('hiddenFileInput').click();
        document.getElementById('actionMenu').classList.remove('show');
    }

    function onFileSelected(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            uploadedImageBase64 = e.target.result.split(',')[1];
            uploadedImageMime   = file.type;
            
            document.getElementById('imgPreviewTarget').src = e.target.result;
            document.getElementById('previewArea').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    function clearImageUpload() {
        uploadedImageBase64 = '';
        uploadedImageMime   = '';
        document.getElementById('hiddenFileInput').value = '';
        document.getElementById('previewArea').style.display = 'none';
    }

    function triggerTextToPhoto() {
        document.getElementById('actionMenu').classList.remove('show');
        const promptText = prompt("Masukkan deskripsi foto (prompt) yang ingin dihasilkan:");
        if (!promptText || !promptText.trim()) return;

        const chatArea = document.getElementById('chatArea');
        const welcome  = chatArea.querySelector('.welcome');
        if (welcome) welcome.remove();

        const displayPrompt = "Hasilkan foto: " + promptText;
        renderBubbleDOM('user', displayPrompt, null, null);
        
        chatHistory.push({ role: 'user', content: displayPrompt });
        saveActiveHistoryToMemory();

        showTyping();

        const generatedUrl = 'https://image.pollinations.ai/p/' + encodeURIComponent(promptText.trim()) + '?width=800&height=800&nologo=true';

        setTimeout(function() {
            removeTyping();
            renderBubbleDOM('ai', 'Berikut adalah foto hasil kreativitas Aira untuk Anda:', null, generatedUrl);
            
            chatHistory.push({ 
                role: 'assistant', 
                content: 'Berikut adalah foto hasil kreativitas Aira untuk Anda:', 
                generatedPhotoUrl: generatedUrl 
            });
            saveActiveHistoryToMemory();
        }, 1200);
    }

    function renderBubbleDOM(role, text, imageData, generatedImageUrl) {
        const chatArea = document.getElementById('chatArea');
        const welcome  = chatArea.querySelector('.welcome');
        if (welcome) welcome.remove();

        const row = document.createElement('div');
        row.className = 'msg-row ' + role;

        if (role === 'ai') {
            const icon = document.createElement('div');
            icon.className   = 'ai-icon';
            icon.textContent = 'A';
            row.appendChild(icon);
        }

        const bubble = document.createElement('div');
        bubble.className = 'bubble ' + role;

        if (imageData) {
            const img = document.createElement('img');
            img.src = 'data:' + imageData.mime + ';base64,' + imageData.data;
            bubble.appendChild(img);
        }

        if (generatedImageUrl) {
            const img = document.createElement('img');
            img.src = generatedImageUrl;
            bubble.appendChild(img);
        }

        if (text) {
            const txtNode = document.createElement('span');
            txtNode.textContent = text;
            bubble.appendChild(txtNode);
        }

        row.appendChild(bubble);
        chatArea.appendChild(row);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function showTyping() {
        const chatArea = document.getElementById('chatArea');
        const row = document.createElement('div');
        row.className = 'typing-row';
        row.id = 'typingRow';

        const icon = document.createElement('div');
        icon.className   = 'ai-icon';
        icon.textContent = 'A';

        const dots = document.createElement('div');
        dots.className = 'typing';
        dots.innerHTML = '<span></span><span></span><span></span>';

        row.appendChild(icon);
        row.appendChild(dots);
        chatArea.appendChild(row);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeTyping() {
        const el = document.getElementById('typingRow');
        if (el) el.remove();
    }

    async function sendMessage() {
        if (isLoading) return;

        const provider = document.getElementById('aiProvider').value;
        const version  = document.getElementById('modelVersion').value;
        const apiKey   = localStorage.getItem('aira_key_' + provider) || '';

        if (!apiKey) {
            document.getElementById('menuDropdown').classList.add('show');
            return;
        }

        const input = document.getElementById('msgInput');
        const msg   = input.value.trim();
        
        if (!msg && !uploadedImageBase64) return;

        input.value        = '';
        input.style.height = 'auto';

        let imageObj = null;
        if (uploadedImageBase64) {
            imageObj = { mime: uploadedImageMime, data: uploadedImageBase64 };
        }

        renderBubbleDOM('user', msg, imageObj, null);
        
        chatHistory.push({ role: 'user', content: msg, image: imageObj });
        saveActiveHistoryToMemory();

        isLoading = true;
        document.getElementById('sendBtn').disabled = true;
        showTyping();

        const systemPrompt = SYSTEM_PROMPTS[version];
        const model        = MODELS[provider][version];

        const processingImage = imageObj;
        clearImageUpload();

        try {
            let reply = '';
            if (provider === 'gemini') {
                reply = await callGemini(apiKey, model, systemPrompt);
            } else if (provider === 'groq') {
                if (processingImage) {
                    throw new Error("Model Groq saat ini belum dioptimalkan untuk memproses input gambar langsung secara client-side. Silakan gunakan penyedia Gemini untuk Vision Mode.");
                }
                reply = await callGroq(apiKey, model, systemPrompt);
            } else if (provider === 'meta') {
                if (processingImage) {
                    throw new Error("Model Meta AI saat ini belum dioptimalkan untuk memproses input gambar langsung secara client-side. Silakan gunakan penyedia Gemini untuk Vision Mode.");
                }
                reply = await callMeta(apiKey, model, systemPrompt);
            }
            removeTyping();
            renderBubbleDOM('ai', reply, null, null);
            chatHistory.push({ role: 'assistant', content: reply });
            saveActiveHistoryToMemory();
        } catch (err) {
            removeTyping();
            renderBubbleDOM('ai', err.message, null, null);
        } finally {
            isLoading = false;
            document.getElementById('sendBtn').disabled = false;
        }
    }

    async function callGemini(apiKey, model, systemPrompt) {
        const contents = chatHistory.map(function(m) {
            let parts = [];
            if (m.image) {
                parts.push({
                    inline_data: {
                        mime_type: m.image.mime,
                        data: m.image.data
                    }
                });
            }
            parts.push({ text: m.content || "" });
            return { role: m.role === 'assistant' ? 'model' : 'user', parts: parts };
        });

        const res = await fetch(
            'https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + apiKey,
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    system_instruction: { parts: [{ text: systemPrompt }] },
                    contents: contents,
                    tools: [{ google_search: {} }]
                })
            }
        );
        
        const contentType = res.headers.get("content-type");
        if (!contentType || !contentType.includes("application/json")) {
            throw new Error("Server API mengirimkan respons tidak valid. Silakan periksa kredensial API Key Anda.");
        }

        const data = await res.json();
        if (!res.ok) throw new Error((data.error && data.error.message) || 'Gemini error');
        
        if (data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0]) {
            return data.candidates[0].content.parts[0].text;
        }
        return 'Maaf, Aira tidak menerima respon balik dari server.';
    }

    async function callGroq(apiKey, model, systemPrompt) {
        const textOnlyHistory = chatHistory.map(function(m) {
            return { role: m.role, content: m.content };
        });

        const messages = [{ role: 'system', content: systemPrompt }].concat(textOnlyHistory);
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
            body: JSON.stringify({ model: model, messages: messages })
        });
        
        const contentType = res.headers.get("content-type");
        if (!contentType || !contentType.includes("application/json")) {
            throw new Error("Server API Groq mengirimkan respons tidak valid. Status: " + res.status);
        }

        const data = await res.json();
        if (!res.ok) throw new Error((data.error && data.error.message) || 'Groq error ' + res.status);
        
        if (data && data.choices && data.choices[0] && data.choices[0].message) {
            return data.choices[0].message.content;
        }
        return 'Maaf, Aira tidak menerima respon balik dari server.';
    }

    async function callMeta(apiKey, model, systemPrompt) {
        const textOnlyHistory = chatHistory.map(function(m) {
            return { role: m.role, content: m.content };
        });

        const messages = [{ role: 'system', content: systemPrompt }].concat(textOnlyHistory);
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
            body: JSON.stringify({ model: model, messages: messages })
        });
        
        const contentType = res.headers.get("content-type");
        if (!contentType || !contentType.includes("application/json")) {
            throw new Error("Server API Meta AI mengirimkan respons tidak valid. Status: " + res.status);
        }

        const data = await res.json();
        if (!res.ok) throw new Error((data.error && data.error.message) || 'Meta AI error ' + res.status);
        
        if (data && data.choices && data.choices[0] && data.choices[0].message) {
            return data.choices[0].message.content;
        }
        return 'Maaf, Aira tidak menerima respon balik dari server.';
    }
