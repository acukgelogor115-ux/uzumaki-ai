<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aira AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background: #050505;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
        }

        /* ── Header ── */
        header {
            width: 100%;
            max-width: 700px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-info {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        
        .header-info h2 { font-size: 16px; font-weight: 700; color: #fff; }
        .header-info p { font-size: 11px; color: #888; margin-top: 1px; }

        .icon-btn {
            width: 38px; height: 38px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            color: #ccc;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        /* ── Modal Pengaturan (Glass Hitam) ── */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal-overlay.show { display: flex; }

        .modal-card {
            width: 100%;
            max-width: 450px;
            background: rgba(20, 20, 20, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-handle {
            width: 40px; height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin: 12px auto 4px;
            cursor: pointer;
        }

        .modal-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .modal-header h3 { font-size: 16px; font-weight: 600; }
        .modal-close {
            background: none; border: none; color: #888; font-size: 20px; cursor: pointer;
        }
        .modal-close:hover { color: #fff; }

        .modal-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .menu-section-title {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .modal-body select,
        .modal-body input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .modal-body select option { background: #141414; }
        .modal-body select:focus,
        .modal-body input:focus { border-color: rgba(255, 255, 255, 0.25); }

        .modal-body button {
            width: 100%;
            padding: 12px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .modal-body button:hover { opacity: 0.9; }

        .api-badge {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            display: none;
            text-align: center;
        }
        .api-badge.ok  { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #fff; }
        .api-badge.err { background: rgba(244,67,54,0.1); border: 1px solid rgba(244,67,54,0.2); color: #f44336; }

        /* ── Riwayat Dropdown ── */
        .history-dropdown {
            display: none;
            position: absolute;
            top: 60px;
            left: 16px;
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            width: 280px;
            max-height: 350px;
            overflow-y: auto;
            box-shadow: 0 16px 40px rgba(0,0,0,0.6);
            z-index: 100;
        }

        .history-dropdown.show { display: block; }
        .history-header { padding: 12px 16px; font-size: 11px; color: #666; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .history-list { padding: 8px; display: flex; flex-direction: column; gap: 4px; }
        .history-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 12px; background: rgba(255,255,255,0.02);
            border: 1px solid transparent; border-radius: 10px; cursor: pointer;
        }
        .history-item:hover { background: rgba(255,255,255,0.06); }
        .history-item.active { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }
        .history-text { color: #ddd; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .history-del { background: none; border: none; color: #ff5252; cursor: pointer; font-size: 12px; padding: 2px; opacity: 0.6; }
        .history-del:hover { opacity: 1; }

        /* ── Chat Area ── */
        .chat-area {
            flex: 1;
            width: 100%;
            max-width: 700px;
            padding: 20px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            height: calc(100vh - 140px);
        }

        .welcome { text-align: center; margin: auto; padding: 20px; }
        .welcome h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .welcome p { color: #666; font-size: 13px; line-height: 1.6; }

        /* Bubbles */
        .msg-row { display: flex; gap: 12px; width: 100%; }
        .msg-row.user { justify-content: flex-end; }
        .msg-row.ai { justify-content: flex-start; }

        .bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .bubble img { max-width: 100%; border-radius: 10px; margin-bottom: 8px; display: block; }
        .bubble.user { background: rgba(255, 255, 255, 0.08); color: #fff; border: 1px solid rgba(255, 255, 255, 0.05); border-bottom-right-radius: 4px; }
        .bubble.ai { background: rgba(255, 255, 255, 0.03); color: #ccc; border: 1px solid rgba(255, 255, 255, 0.03); border-bottom-left-radius: 4px; }

        /* Typing */
        .typing-row { display: flex; align-items: center; padding: 4px; }
        .typing { display: flex; gap: 4px; padding: 12px 16px; background: rgba(255,255,255,0.03); border-radius: 16px; }
        .typing span { width: 6px; height: 6px; background: #888; border-radius: 50%; animation: bounce 1.2s infinite; }
        .typing span:nth-child(2) { animation-delay: .2s; }
        .typing span:nth-child(3) { animation-delay: .4s; }
        @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

        /* ── Input Container ── */
        .input-container {
            width: 100%;
            max-width: 700px;
            background: rgba(10, 10, 10, 0.8);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        .preview-area {
            display: none;
            padding: 12px 16px;
            position: relative;
            background: rgba(0,0,0,0.4);
        }
        .preview-area img { max-height: 80px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .preview-close {
            position: absolute; top: 6px; left: 90px; background: #ff5252;
            border: none; color: #fff; width: 18px; height: 18px; border-radius: 50%;
            cursor: pointer; font-size: 10px; line-height: 18px; text-align: center;
        }

        .input-area { width: 100%; padding: 12px 16px; display: flex; align-items: flex-end; gap: 12px; }
        
        .input-area textarea {
            flex: 1; padding: 12px 16px; background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px;
            color: #fff; font-size: 14px; resize: none; outline: none;
            max-height: 120px; line-height: 1.5;
        }
        .input-area textarea:focus { border-color: rgba(255, 255, 255, 0.2); }

        .action-wrapper { position: relative; display: flex; align-items: center; }
        
        .plus-btn {
            width: 40px; height: 40px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 50%;
            color: #fff; font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .action-menu {
            display: none; position: absolute; bottom: 50px; left: 0;
            background: #141414; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; min-width: 140px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 60;
        }
        .action-menu.show { display: block; }
        .action-menu div { padding: 10px 14px; color: #ccc; font-size: 13px; cursor: pointer; }
        .action-menu div:hover { background: rgba(255,255,255,0.08); color: #fff; }

        .send-btn {
            width: 40px; height: 40px; background: #fff; border: none; border-radius: 50%;
            color: #000; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>
  
  <header>
    <div class="header-left">
        <button class="icon-btn" onclick="toggleHistory()">H</button>
    </div>

    <div class="header-info">
        <h2>Aira AI</h2>
        <p>Diciptakan oleh Manz Uzumaki</p>
    </div>

    <div class="header-right">
        <button class="icon-btn" onclick="newChat()">+</button>
        <button class="icon-btn" onclick="toggleModal(true)">S</button>
    </div>

    <div class="history-dropdown" id="historyDropdown">
        <div class="history-header">Riwayat Sesi</div>
        <div class="history-list" id="historyList"></div>
    </div>
</header>

<div class="modal-overlay" id="settingsModal" onclick="closeModalOutside(event)">
    <div class="modal-card">
        <div class="modal-handle" onclick="toggleModal(false)"></div>
        <div class="modal-header">
            <h3>Pengaturan Aplikasi</h3>
            <button class="modal-close" onclick="toggleModal(false)">&times;</button>
        </div>
        <div class="modal-body">
            <div>
                <div class="menu-section-title">Pilih Penyedia AI</div>
                <select id="aiProvider" onchange="onProviderChange()">
                    <option value="gemini">Gemini (Google)</option>
                    <option value="groq">Groq (Gratis & Cepat)</option>
                    <option value="meta">Meta AI (Llama)</option>
                </select>
            </div>

            <div>
                <div class="menu-section-title">Pilih Versi Model</div>
                <select id="modelVersion" onchange="saveVersion()">
                    <option value="fast">Cepat</option>
                    <option value="deep">Mendalam</option>
                    <option value="think">Berpikir</option>
                    <option value="task">Tugas</option>
                </select>
            </div>

            <div>
                <div class="menu-section-title">API Key</div>
                <input type="password" id="apiKeyInput" placeholder="Masukkan enkripsi API key...">
                <button style="margin-top: 10px;" onclick="saveApiKey()">Simpan Perubahan</button>
            </div>

            <div class="api-badge" id="apiBadge"></div>
        </div>
    </div>
</div>

<div class="chat-area" id="chatArea">
    <div class="welcome">
        <h3>Aira AI</h3>
        <p>Buka menu pengaturan di pojok kanan atas untuk mengonfigurasi API key dan model AI.</p>
    </div>
</div>

<div class="input-container">
    <div class="preview-area" id="previewArea">
        <img src="" id="imgPreviewTarget" alt="Upload Preview">
        <button class="preview-close" onclick="clearImageUpload()">&times;</button>
    </div>

    <div class="input-area">
        <div class="action-wrapper">
            <button class="plus-btn" onclick="toggleActionMenu(event)">+</button>
            <div class="action-menu" id="actionMenu">
                <div onclick="triggerImageFile()">Kirim Foto</div>
                <div onclick="triggerTextToPhoto()">Buat Foto</div>
            </div>
        </div>
        
        <input type="file" id="hiddenFileInput" accept="image/*" style="display:none;" onchange="onFileSelected(this)">

        <textarea id="msgInput" placeholder="Ketik pesan..." rows="1"
            oninput="autoResize(this)"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}">
        </textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">></button>
    </div>
</div>

<script>
    const MODELS = {
        gemini: {
            fast:  'gemini-2.5-flash',
            deep:  'gemini-2.5-pro',
            think: 'gemini-2.5-flash-thinking',
            task:  'gemini-2.5-pro'
        },
        groq: {
            fast:  'llama-3.1-8b-instant',
            deep:  'groq/compound', 
            think: 'deepseek-r1-distill-llama-70b',
            task:  'groq/compound-mini' 
        },
        meta: {
            fast:  'llama-3.2-3b-preview',
            deep:  'llama-3.2-3b-preview',
            think: 'llama-3.2-3b-preview',
            task:  'llama-3.2-3b-preview'
        }
    };

    // System Prompt sepenuhnya menggunakan Instruksi Bahasa Gaul Santai
    const SYSTEM_PROMPTS = {
        fast:  'Nama lo Aira, asisten cerdas buatan Manz Uzumaki. Jawab pake bahasa gaul, santai, singkat, ama padat aja.',
        deep:  'Nama lo Aira, asisten cerdas buatan Manz Uzumaki. Jawab pake bahasa gaul yang santai tapi tetep mendalam, jelas, ama terstruktur.',
        think: 'Nama lo Aira, asisten cerdas buatan Manz Uzumaki. Mikir dulu bener-bener pake logika, baru lo jawab pake gaya bahasa gaul yang santai.',
        task:  'Nama lo Aira, asisten cerdas buatan Manz Uzumaki. Bantu kelarin tugas ato PR user, jelasinnya yang gampang dimengerti pake bahasa gaul santai.'
    };

    let chatHistory      = [];
    let isLoading        = false;
    let currentSessionId = localStorage.getItem('aira_active_session') || '';
    let sessions         = JSON.parse(localStorage.getItem('aira_sessions')) || [];
    
    let uploadedImageBase64 = '';
    let uploadedImageMime   = '';

    const savedProvider = localStorage.getItem('aira_provider') || 'gemini';
    const savedVersion  = localStorage.getItem('aira_version')  || 'fast';
    const savedKey      = localStorage.getItem('aira_key_' + savedProvider) || '';

    document.getElementById('aiProvider').value   = savedProvider;
    document.getElementById('modelVersion').value = savedVersion;

    if (savedKey) {
        document.getElementById('apiKeyInput').value = savedKey;
        showBadge(true, getProviderName(savedProvider) + ' Aktif');
    }

    if (!currentSessionId || !getSessionById(currentSessionId)) {
        createNewSession();
    } else {
        loadSession(currentSessionId);
    }
    renderHistoryList();

    document.addEventListener('click', function(e) {
        const hist = document.getElementById('historyDropdown');
        const act  = document.getElementById('actionMenu');
        
        if (!e.target.closest('.history-container') && !e.target.closest('.header-left')) hist.classList.remove('show');
        if (!e.target.closest('.action-wrapper')) act.classList.remove('show');
    });

    function toggleModal(show) {
        const modal = document.getElementById('settingsModal');
        if (show) modal.classList.add('show');
        else modal.classList.remove('show');
    }

    function closeModalOutside(e) {
        if (e.target.id === 'settingsModal') toggleModal(false);
    }

    function toggleHistory() { document.getElementById('historyDropdown').classList.toggle('show'); }
    function toggleActionMenu(e) { e.stopPropagation(); document.getElementById('actionMenu').classList.toggle('show'); }

    function onProviderChange() {
        const p = document.getElementById('aiProvider').value;
        const key = localStorage.getItem('aira_key_' + p) || '';
        document.getElementById('apiKeyInput').value = key;
        localStorage.setItem('aira_provider', p);
        if (key) showBadge(true, getProviderName(p) + ' Aktif');
        else     hideBadge();
    }

    function saveVersion() {
        localStorage.setItem('aira_version', document.getElementById('modelVersion').value);
    }

    function getProviderName(p) {
        return { gemini:'Gemini', groq:'Groq', meta:'Meta AI' }[p] || p;
    }

    function saveApiKey() {
        const provider = document.getElementById('aiProvider').value;
        const key      = document.getElementById('apiKeyInput').value.trim();
        if (!key) { showBadge(false, 'API Key Kosong'); return; }
        localStorage.setItem('aira_provider', provider);
        localStorage.setItem('aira_key_' + provider, key);
        showBadge(true, getProviderName(provider) + ' Tersimpan');
        setTimeout(function() { toggleModal(false); }, 600);
    }

    function showBadge(ok, text) {
        const el = document.getElementById('apiBadge');
        el.textContent  = text;
        el.className    = 'api-badge ' + (ok ? 'ok' : 'err');
        el.style.display = 'block';
    }

    function hideBadge() { document.getElementById('apiBadge').style.display = 'none'; }

    function getSessionById(id) {
        for (let i = 0; i < sessions.length; i++) {
            if (sessions[i].id === id) return sessions[i];
        }
        return null;
    }

    function createNewSession() {
        currentSessionId = 'sess_' + Date.now();
        localStorage.setItem('aira_active_session', currentSessionId);
        const newSess = { id: currentSessionId, title: 'Percakapan Baru', history: [] };
        sessions.unshift(newSess);
        localStorage.setItem('aira_sessions', JSON.stringify(sessions));
        chatHistory = [];
        showWelcomeScreen();
        renderHistoryList();
    }

    function newChat() {
        createNewSession();
        clearImageUpload();
    }

    function loadSession(id) {
        currentSessionId = id;
        localStorage.setItem('aira_active_session', currentSessionId);
        const sess = getSessionById(id);
        if (sess) {
            chatHistory = sess.history;
            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML = '';
            if (chatHistory.length === 0) {
                showWelcomeScreen();
            } else {
                for (let i = 0; i < chatHistory.length; i++) {
                    renderBubbleDOM(
                        chatHistory[i].role === 'assistant' ? 'ai' : 'user', 
                        chatHistory[i].content,
                        chatHistory[i].image || null,
                        chatHistory[i].generatedPhotoUrl || null
                    );
                }
            }
        }
        renderHistoryList();
        clearImageUpload();
    }

    function deleteSession(id, event) {
        if (event) event.stopPropagation();
        sessions = sessions.filter(function(s) { return s.id !== id; });
        localStorage.setItem('aira_sessions', JSON.stringify(sessions));
        if (currentSessionId === id) {
            if (sessions.length > 0) loadSession(sessions[0].id);
            else createNewSession();
        } else {
            renderHistoryList();
        }
    }

    function saveActiveHistoryToMemory() {
        const sess = getSessionById(currentSessionId);
        if (sess) {
            sess.history = chatHistory;
            if (chatHistory.length > 0 && sess.title === 'Percakapan Baru') {
                let firstUserText = '';
                for (let i = 0; i < chatHistory.length; i++) {
                    if (chatHistory[i].role === 'user') { firstUserText = chatHistory[i].content; break; }
                }
                if (!firstUserText) firstUserText = "Kirim / Buat Foto";
                sess.title = firstUserText.substring(0, 22) + (firstUserText.length > 22 ? '...' : '');
            }
            localStorage.setItem('aira_sessions', JSON.stringify(sessions));
            renderHistoryList();
        }
    }

    function renderHistoryList() {
        const listEl = document.getElementById('historyList');
        if (!listEl) return;
        listEl.innerHTML = '';
        if (sessions.length === 0) {
            listEl.innerHTML = '<div style="text-align:center; color:#444; font-size:12px; padding:16px;">Tidak ada riwayat</div>';
            return;
        }
        for (let i = 0; i < sessions.length; i++) {
            const s = sessions[i];
            const item = document.createElement('div');
            item.className = 'history-item' + (s.id === currentSessionId ? ' active' : '');
            item.setAttribute('onclick', "loadSession('" + s.id + "')");

            const txt = document.createElement('span');
            txt.className = 'history-text';
            txt.textContent = s.title;

            const del = document.createElement('button');
            del.className = 'history-del';
            del.innerHTML = 'Hapus';
            del.setAttribute('onclick', "deleteSession('" + s.id + "', event)");

            item.appendChild(txt);
            item.appendChild(del);
            listEl.appendChild(item);
        }
    }

    function showWelcomeScreen() {
        document.getElementById('chatArea').innerHTML = `
            <div class="welcome">
                <h3>Aira AI</h3>
                <p>Buka menu pengaturan di pojok kanan atas untuk mengonfigurasi API key dan model AI.</p>
            </div>`;
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function triggerImageFile() {
        document.getElementById('hiddenFileInput').click();
        document.getElementById('actionMenu').classList.remove('show');
    }

    function onFileSelected(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            uploadedImageBase64 = e.target.result.split(',')[1];
            uploadedImageMime   = file.type;
            
            document.getElementById('imgPreviewTarget').src = e.target.result;
            document.getElementById('previewArea').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    function clearImageUpload() {
        uploadedImageBase64 = '';
        uploadedImageMime   = '';
        document.getElementById('hiddenFileInput').value = '';
        document.getElementById('previewArea').style.display = 'none';
    }

    function triggerTextToPhoto() {
        document.getElementById('actionMenu').classList.remove('show');
        const promptText = prompt("Masukkan deskripsi foto:");
        if (!promptText || !promptText.trim()) return;

        const chatArea = document.getElementById('chatArea');
        const welcome  = chatArea.querySelector('.welcome');
        if (welcome) welcome.remove();

        const displayPrompt = "Hasilkan foto: " + promptText;
        renderBubbleDOM('user', displayPrompt, null, null);
        
        chatHistory.push({ role: 'user', content: displayPrompt });
        saveActiveHistoryToMemory();

        showTyping();

        const generatedUrl = 'https://image.pollinations.ai/p/' + encodeURIComponent(promptText.trim()) + '?width=800&height=800&nologo=true';

        setTimeout(function() {
            removeTyping();
            renderBubbleDOM('ai', 'Berikut adalah foto hasil kreativitas Aira:', null, generatedUrl);
            
            chatHistory.push({ 
                role: 'assistant', 
                content: 'Berikut adalah foto hasil kreativitas Aira:', 
                generatedPhotoUrl: generatedUrl 
            });
            saveActiveHistoryToMemory();
        }, 1200);
    }

    function renderBubbleDOM(role, text, imageData, generatedImageUrl) {
        const chatArea = document.getElementById('chatArea');
        const welcome  = chatArea.querySelector('.welcome');
        if (welcome) welcome.remove();

        const row = document.createElement('div');
        row.className = 'msg-row ' + role;

        const bubble = document.createElement('div');
        bubble.className = 'bubble ' + role;

        if (imageData) {
            const img = document.createElement('img');
            img.src = 'data:' + imageData.mime + ';base64,' + imageData.data;
            bubble.appendChild(img);
        }

        if (generatedImageUrl) {
            const img = document.createElement('img');
            img.src = generatedImageUrl;
            bubble.appendChild(img);
        }

        if (text) {
            const txtNode = document.createElement('span');
            txtNode.textContent = text;
            bubble.appendChild(txtNode);
        }

        row.appendChild(bubble);
        chatArea.appendChild(row);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function showTyping() {
        const chatArea = document.getElementById('chatArea');
        const row = document.createElement('div');
        row.className = 'typing-row';
        row.id = 'typingRow';

        const dots = document.createElement('div');
        dots.className = 'typing';
        dots.innerHTML = '<span></span><span></span><span></span>';

        row.appendChild(dots);
        chatArea.appendChild(row);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeTyping() {
        const el = document.getElementById('typingRow');
        if (el) el.remove();
    }

    async function sendMessage() {
        if (isLoading) return;

        const provider = document.getElementById('aiProvider').value;
        const version  = document.getElementById('modelVersion').value;
        const apiKey   = localStorage.getItem('aira_key_' + provider) || '';

        if (!apiKey) {
            toggleModal(true);
            return;
        }

        const input = document.getElementById('msgInput');
        const msg   = input.value.trim();
        
        if (!msg && !uploadedImageBase64) return;

        input.value        = '';
        input.style.height = 'auto';

        let imageObj = null;
        if (uploadedImageBase64) {
            imageObj = { mime: uploadedImageMime, data: uploadedImageBase64 };
        }

        renderBubbleDOM('user', msg, imageObj, null);
        
        chatHistory.push({ role: 'user', content: msg, image: imageObj });
        saveActiveHistoryToMemory();

        isLoading = true;
        document.getElementById('sendBtn').disabled = true;
        showTyping();

        const systemPrompt = SYSTEM_PROMPTS[version];
        const model        = MODELS[provider][version];

        const processingImage = imageObj;
        clearImageUpload();

        try {
            let reply = '';
            if (provider === 'gemini') {
                reply = await callGemini(apiKey, model, systemPrompt);
            } else if (provider === 'groq') {
                if (processingImage) {
                    throw new Error("Model Groq belum dioptimalkan untuk memproses input gambar langsung secara client-side. Silakan gunakan penyedia Gemini untuk Vision Mode.");
                }
                reply = await callGroq(apiKey, model, systemPrompt);
            } else if (provider === 'meta') {
                if (processingImage) {
                    throw new Error("Model Meta AI belum dioptimalkan untuk memproses input gambar langsung secara client-side. Silakan gunakan penyedia Gemini untuk Vision Mode.");
                }
async function callGemini(apiKey, model, systemPrompt) {
        const contents = chatHistory.map(function(m) {
            let parts = [];
            if (m.image) {
                parts.push({
                    inline_data: {
                        mime_type: m.image.mime,
                        data: m.image.data
                    }
                });
            }
            parts.push({ text: m.content || "" });
            return { role: m.role === 'assistant' ? 'model' : 'user', parts: parts };
        });

        const res = await fetch(
            'https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + apiKey,
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    system_instruction: { parts: [{ text: systemPrompt }] },
                    contents: contents,
                    tools: [{ google_search: {} }]
                })
            }
        );
        
        const contentType = res.headers.get("content-type");
        if (!contentType || !contentType.includes("application/json")) {
            throw new Error("Server API mengirimkan respons tidak valid. Periksa konfigurasi API Key Anda.");
        }

        const data = await res.json();
        if (!res.ok) throw new Error((data.error && data.error.message) || 'Gemini error');
        
        if (data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0]) {
            return data.candidates[0].content.parts[0].text;
        }
        return 'Maaf, Aira tidak menerima respon balik dari server.';
    }

    async function callGroq(apiKey, model, systemPrompt) {
        const textOnlyHistory = chatHistory.map(function(m) {
            return { role: m.role, content: m.content };
        });

        const messages = [{ role: 'system', content: systemPrompt }].concat(textOnlyHistory);
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
            body: JSON.stringify({ model: model, messages: messages })
        });
        
        const contentType = res.headers.get("content-type");
        if (!contentType || !contentType.includes("application/json")) {
            throw new Error("Server API Groq mengirimkan respons tidak valid.");
        }

        const data = await res.json();
        if (!res.ok) throw new Error((data.error && data.error.message) || 'Groq error ' + res.status);
        
        if (data && data.choices && data.choices[0] && data.choices[0].message) {
            return data.choices[0].message.content;
        }
        return 'Maaf, Aira tidak menerima respon balik dari server.';
    }

    async function callMeta(apiKey, model, systemPrompt) {
        const textOnlyHistory = chatHistory.map(function(m) {
            return { role: m.role, content: m.content };

        const messages = [{ role: 'system', content: systemPrompt }].concat(textOnlyHistory);
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
            body: JSON.stringify({ model: model, messages: messages })

        const contentType = res.headers.get("content-type");

        }

        const data = await res.json();
        if (!res.ok) throw new Error((data.error && data.error.message) || 'Meta AI error ' + res.status);
        
        if (data && data.choices && data.choices[0] && data.choices[0].message) {
            return data.choices[0].message.content;
        }
        return 'Maaf, Aira tidak menerima respon balik dari server.';
    }
