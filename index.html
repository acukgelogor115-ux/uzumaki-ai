<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzumaki AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── Header ── */
        header {
            width: 100%;
            max-width: 700px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .avatar {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, #ff6b00, #ff0050);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            box-shadow: 0 0 14px rgba(255,107,0,0.35);
        }

        .header-info { flex: 1; }
        .header-info h2 { color: #fff; font-size: 15px; font-weight: 700; }
        .header-info p  { color: #555; font-size: 11px; margin-top: 1px; }

        .online-dot {
            width: 6px; height: 6px;
            background: #00e676;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

        /* Header icon buttons */
        .icon-btn {
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 50%;
            color: #888;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .icon-btn:hover {
            background: rgba(255,107,0,0.15);
            border-color: rgba(255,107,0,0.3);
            color: #ff6b00;
        }

        /* ── Menu ── */
        .menu-container { position: relative; }

        .menu-dropdown {
            display: none;
            position: absolute;
            top: 44px;
            right: 0;
            background: rgba(14,14,14,0.98);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px;
            min-width: 270px;
            box-shadow: 0 16px 50px rgba(0,0,0,0.7);
            overflow: hidden;
            backdrop-filter: blur(24px);
            z-index: 100;
        }

        .menu-dropdown.show {
            display: block;
            animation: fadeDown 0.2s ease;
        }

        @keyframes fadeDown {
            from { opacity:0; transform:translateY(-8px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .menu-section {
            padding: 14px 16px 6px;
            font-size: 10px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 600;
        }

        .menu-inner {
            padding: 4px 14px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-inner select,
        .menu-inner input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #ccc;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .menu-inner select option { background: #111; }
        .menu-inner select:focus,
        .menu-inner input:focus   { border-color: rgba(255,107,0,0.4); }
        .menu-inner input::placeholder { color: #333; }

        .menu-divider {
            height: 1px;
            background: rgba(255,255,255,0.05);
            margin: 4px 14px;
        }

        .menu-inner button {
            width: 100%;
            padding: 11px;
            background: linear-gradient(135deg, #ff6b00, #ff0050);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .menu-inner button:hover { opacity: 0.85; }

        .api-badge {
            padding: 7px 10px;
            border-radius: 8px;
            font-size: 11px;
            display: none;
        }

        .api-badge.ok  { background:rgba(0,230,118,.07); border:1px solid rgba(0,230,118,.15); color:#00e676; }
        .api-badge.err { background:rgba(255,82,82,.07);  border:1px solid rgba(255,82,82,.15);  color:#ff5252; }

        /* ── Chat area ── */
        .chat-area {
            flex: 1;
            width: 100%;
            max-width: 700px;
            padding: 20px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            height: calc(100vh - 130px);
        }

        .welcome {
            text-align: center;
            margin: auto;
            padding: 30px 20px;
        }

        .welcome .logo {
            font-size: 52px;
            margin-bottom: 14px;
            filter: drop-shadow(0 0 18px rgba(255,107,0,.45));
        }

        .welcome h3 { color:#fff; font-size:19px; font-weight:700; margin-bottom:6px; }
        .welcome p  { color:#3a3a3a; font-size:13px; line-height:1.7; }

        /* Bubbles */
        .msg-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .msg-row.user { justify-content: flex-end; }
        .msg-row.ai   { justify-content: flex-start; }

        .ai-icon {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, #ff6b00, #ff0050);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
        }

        .bubble {
            max-width: 75%;
            padding: 11px 15px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.65;
            word-break: break-word;
            white-space: pre-wrap;
        }

        /* USER — hitam glass */
        .bubble.user {
            background: rgba(255,255,255,0.06);
            color: #ddd;
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
        }

        /* AI — sedikit lebih gelap */
        .bubble.ai {
            background: rgba(255,255,255,0.03);
            color: #ccc;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(12px);
        }

        /* Typing */
        .typing-row { display:flex; gap:10px; align-items:flex-end; }

        .typing {
            display: flex;
            gap: 5px;
            padding: 13px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .typing span {
            width: 7px; height: 7px;
            background: #ff6b00;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing span:nth-child(2) { animation-delay:.2s; }
        .typing span:nth-child(3) { animation-delay:.4s; }

        @keyframes bounce {
            0%,60%,100%{transform:translateY(0)}
            30%{transform:translateY(-7px)}
        }

        /* ── Input area ── */
        .input-area {
            width: 100%;
            max-width: 700px;
            padding: 10px 14px 16px;
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.02);
            border-top: 1px solid rgba(255,255,255,0.04);
        }

        .input-area textarea {
            flex: 1;
            padding: 11px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 22px;
            color: #ddd;
            font-size: 14px;
            resize: none;
            outline: none;
            max-height: 120px;
            line-height: 1.5;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .input-area textarea:focus { border-color: rgba(255,107,0,0.35); }
        .input-area textarea::placeholder { color: #2e2e2e; }

        .send-btn {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, #ff6b00, #ff0050);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 17px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            align-self: flex-end;
            box-shadow: 0 4px 14px rgba(255,107,0,0.25);
        }

        .send-btn:hover    { transform:scale(1.08); }
        .send-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }
    </style>
</head>
<body>

<header>
    <div class="avatar">🍥</div>
    <div class="header-info">
        <h2>Uzumaki AI</h2>
        <p><span class="online-dot"></span>Diciptakan oleh Manz Uzumaki</p>
    </div>

    <!-- Tombol percakapan baru -->
    <button class="icon-btn" onclick="newChat()" title="Percakapan Baru">✏️</button>

    <!-- Menu titik tiga -->
    <div class="menu-container">
        <button class="icon-btn" onclick="toggleMenu()">⋮</button>
        <div class="menu-dropdown" id="menuDropdown">

            <div class="menu-section">🤖 Pilih AI & Versi</div>
            <div class="menu-inner">
                <select id="aiProvider" onchange="onProviderChange()">
                    <option value="gemini">🔵 Gemini (Google)</option>
                    <option value="groq">⚡ Groq (Gratis & Cepat)</option>
                </select>
                <select id="modelVersion" onchange="saveVersion()">
                    <option value="fast">🚀 Cepat — respons kilat</option>
                    <option value="deep">🧠 Mendalam — analisis detail</option>
                    <option value="think">💭 Berfikir — penalaran panjang</option>
                    <option value="task">📚 Tugas — bantu PR & pekerjaan</option>
                </select>
            </div>

            <div class="menu-divider"></div>

            <div class="menu-section">🔑 API Key</div>
            <div class="menu-inner">
                <input type="password" id="apiKeyInput" placeholder="Masukkan API key...">
                <button onclick="saveApiKey()">✅ Simpan</button>
                <div class="api-badge" id="apiBadge"></div>
            </div>

        </div>
    </div>
</header>

<div class="chat-area" id="chatArea">
    <div class="welcome">
        <div class="logo">🍥</div>
        <h3>Uzumaki AI</h3>
        <p>Ketuk ⋮ di pojok kanan atas<br>untuk pilih AI, versi, dan masukkan API key!</p>
    </div>
</div>

<div class="input-area">
    <textarea id="msgInput" placeholder="Ketik pesan..." rows="1"
        oninput="autoResize(this)"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}">
    </textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
</div>

<script>
    // Model map per provider dan versi
    const MODELS = {
        gemini: {
            fast:  'gemini-2.0-flash',
            deep:  'gemini-1.5-pro',
            think: 'gemini-2.0-flash-thinking-exp',
            task:  'gemini-1.5-pro'
        },
        groq: {
            fast:  'llama-3.1-8b-instant',
            deep:  'llama-3.3-70b-versatile',
            think: 'deepseek-r1-distill-llama-70b',
            task:  'llama-3.3-70b-versatile'
        }
    };

    const SYSTEM_PROMPTS = {
        fast:  'Kamu adalah Uzumaki AI, asisten cerdas ciptaan Manz Uzumaki. Jawab singkat, padat, dan cepat. Jangan sebut nama model atau perusahaan AI apapun.',
        deep:  'Kamu adalah Uzumaki AI, asisten cerdas ciptaan Manz Uzumaki. Berikan jawaban mendalam, terstruktur, dan komprehensif. Jangan sebut nama model atau perusahaan AI apapun.',
        think: 'Kamu adalah Uzumaki AI, asisten cerdas ciptaan Manz Uzumaki. Pikirkan langkah demi langkah sebelum menjawab. Gunakan penalaran yang kuat dan logis. Jangan sebut nama model atau perusahaan AI apapun.',
        task:  'Kamu adalah Uzumaki AI, asisten cerdas ciptaan Manz Uzumaki yang ahli membantu tugas sekolah, pekerjaan, dan analisis. Jawab dengan jelas, terstruktur, dan mudah dipahami. Jangan sebut nama model atau perusahaan AI apapun.'
    };

    let chatHistory = [];
    let isLoading   = false;

    // Load saved settings
    const savedProvider = localStorage.getItem('uzumaki_provider') || 'gemini';
    const savedVersion  = localStorage.getItem('uzumaki_version')  || 'fast';
    const savedKey      = localStorage.getItem('uzumaki_key_' + savedProvider) || '';

    document.getElementById('aiProvider').value   = savedProvider;
    document.getElementById('modelVersion').value = savedVersion;

    if (savedKey) {
        document.getElementById('apiKeyInput').value = savedKey;
        showBadge(true, getProviderName(savedProvider) + ' aktif');
    }

    document.addEventListener('click', function(e) {
        const menu = document.getElementById('menuDropdown');
        const btns = document.querySelectorAll('.menu-container');
        let inside = false;
        btns.forEach(function(b) { if (b.contains(e.target)) inside = true; });
        if (!inside) menu.classList.remove('show');
    });

    function toggleMenu() {
        document.getElementById('menuDropdown').classList.toggle('show');
    }

    function onProviderChange() {
        const p   = document.getElementById('aiProvider').value;
        const key = localStorage.getItem('uzumaki_key_' + p) || '';
        document.getElementById('apiKeyInput').value = key;
        localStorage.setItem('uzumaki_provider', p);
        if (key) showBadge(true, getProviderName(p) + ' aktif');
        else     hideBadge();
    }

    function saveVersion() {
        localStorage.setItem('uzumaki_version', document.getElementById('modelVersion').value);
    }

    function getProviderName(p) {
        return { gemini:'Gemini', groq:'Groq' }[p] || p;
    }

    function saveApiKey() {
        const provider = document.getElementById('aiProvider').value;
        const key      = document.getElementById('apiKeyInput').value.trim();
        if (!key) { showBadge(false, 'API key kosong!'); return; }
        localStorage.setItem('uzumaki_provider', provider);
        localStorage.setItem('uzumaki_key_' + provider, key);
        showBadge(true, getProviderName(provider) + ' tersimpan!');
        setTimeout(function() { document.getElementById('menuDropdown').classList.remove('show'); }, 700);
    }

    function showBadge(ok, text) {
        const el = document.getElementById('apiBadge');
        el.textContent  = (ok ? '✅ ' : '❌ ') + text;
        el.className    = 'api-badge ' + (ok ? 'ok' : 'err');
        el.style.display = 'block';
    }

    function hideBadge() {
        document.getElementById('apiBadge').style.display = 'none';
    }

    function newChat() {
        chatHistory = [];
        const chatArea = document.getElementById('chatArea');
        chatArea.innerHTML = `
            <div class="welcome">
                <div class="logo">🍥</div>
                <h3>Percakapan Baru</h3>
                <p>Silakan mulai percakapan baru!</p>
            </div>`;
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function addBubble(role, text) {
        const chatArea = document.getElementById('chatArea');
        const welcome  = chatArea.querySelector('.welcome');
        if (welcome) welcome.remove();

        const row = document.createElement('div');
        row.className = 'msg-row ' + role;

        if (role === 'ai') {
            const icon = document.createElement('div');
            icon.className   = 'ai-icon';
            icon.textContent = '🍥';
            row.appendChild(icon);
        }

        const bubble = document.createElement('div');
        bubble.className   = 'bubble ' + role;
        bubble.textContent = text;
        row.appendChild(bubble);

        chatArea.appendChild(row);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function showTyping() {
        const chatArea = document.getElementById('chatArea');
        const row = document.createElement('div');
        row.className = 'typing-row';
        row.id = 'typingRow';

        const icon = document.createElement('div');
        icon.className   = 'ai-icon';
        icon.textContent = '🍥';

        const dots = document.createElement('div');
        dots.className = 'typing';
        dots.innerHTML = '<span></span><span></span><span></span>';

        row.appendChild(icon);
        row.appendChild(dots);
        chatArea.appendChild(row);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeTyping() {
        const el = document.getElementById('typingRow');
        if (el) el.remove();
    }

    async function sendMessage() {
        if (isLoading) return;

        const provider = document.getElementById('aiProvider').value;
        const version  = document.getElementById('modelVersion').value;
        const apiKey   = localStorage.getItem('uzumaki_key_' + provider) || '';

        if (!apiKey) {
            document.getElementById('menuDropdown').classList.add('show');
            return;
        }

        const input = document.getElementById('msgInput');
        const msg   = input.value.trim();
        if (!msg) return;

        input.value        = '';
        input.style.height = 'auto';

        addBubble('user', msg);
        chatHistory.push({ role: 'user', content: msg });

        isLoading = true;
        document.getElementById('sendBtn').disabled = true;
        showTyping();

        const systemPrompt = SYSTEM_PROMPTS[version];
        const model        = MODELS[provider][version];

        try {
            let reply = '';
            if (provider === 'gemini') {
                reply = await callGemini(apiKey, model, systemPrompt);
            } else {
                reply = await callGroq(apiKey, model, systemPrompt);
            }
            removeTyping();
            addBubble('ai', reply);
            chatHistory.push({ role: 'assistant', content: reply });
        } catch (err) {
            removeTyping();
            addBubble('ai', '❌ ' + err.message);
        } finally {
            isLoading = false;
            document.getElementById('sendBtn').disabled = false;
        }
    }

    async function callGemini(apiKey, model, systemPrompt) {
        const contents = chatHistory.map(function(m) {
            return { role: m.role === 'assistant' ? 'model' : 'user', parts: [{ text: m.content }] };
        });
        ({
                    system_instruction: { parts: [{ text: systemPrompt }] },
                    contents: contents
                })
            }
        );
        const data = await res.json();
        if (!res.ok) throw new Error((data.error && data.error.message) || 'Gemini error');
        return data.candidates?.[0]?.content?.parts?.[0]?.text || 'Maaf, tidak ada respons.';
    }

    async function callGroq(apiKey, model, systemPrompt) {
        const messages = [{ role: 'system', content: systemPrompt }].concat(chatHistory);
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
            body: JSON.stringify({ model: model, messages: messages })
        });
        const data = await res.json();
        if (!res.ok) throw new Error((data.error && data.error.message) || 'Groq error ' + res.status);
        return data.choices?.[0]?.message?.content || 'Maaf, tidak ada respons.';
    }
</script>
</body>
</html>
