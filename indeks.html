<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzumaki AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background: linear-gradient(135deg, #0d0d0d 0%, #1a0a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 700px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,165,0,0.2);
        }

        .avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #ff6b00, #ff0050);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .header-info h2 {
            color: #ff6b00;
            font-size: 17px;
            font-weight: 800;
        }

        .header-info p {
            color: #aaa;
            font-size: 12px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #00e676;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* API key setup */
        .setup-box {
            width: 100%;
            max-width: 700px;
            padding: 16px 20px;
            background: rgba(255,107,0,0.08);
            border-bottom: 1px solid rgba(255,107,0,0.2);
            display: flex;
            gap: 8px;
        }

        .setup-box input {
            flex: 1;
            padding: 10px 14px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,107,0,0.3);
            border-radius: 8px;
            color: white;
            font-size: 13px;
            outline: none;
        }

        .setup-box input:focus {
            border-color: #ff6b00;
        }

        .setup-box input::placeholder {
            color: #666;
        }

        .setup-box button {
            padding: 10px 16px;
            background: linear-gradient(135deg, #ff6b00, #ff0050);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .api-status {
            font-size: 11px;
            color: #888;
            padding: 4px 20px 8px;
            width: 100%;
            max-width: 700px;
        }

        .api-status.ok { color: #00e676; }
        .api-status.err { color: #ff5252; }

        /* Chat area */
        .chat-area {
            flex: 1;
            width: 100%;
            max-width: 700px;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 0;
            height: calc(100vh - 220px);
        }

        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .bubble.user {
            background: linear-gradient(135deg, #ff6b00, #ff0050);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bubble.ai {
            background: rgba(255,255,255,0.07);
            color: #eee;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,107,0,0.15);
        }

        .bubble.ai .name-tag {
            font-size: 11px;
            color: #ff6b00;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .typing {
            display: flex;
            gap: 5px;
            padding: 14px 18px;
            background: rgba(255,255,255,0.07);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,107,0,0.15);
            align-self: flex-start;
            width: fit-content;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #ff6b00;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* Input area */
        .input-area {
            width: 100%;
            max-width: 700px;
            padding: 12px 20px 20px;
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,165,0,0.1);
        }

        .input-area textarea {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,107,0,0.3);
            border-radius: 22px;
            color: white;
            font-size: 14px;
            resize: none;
            outline: none;
            max-height: 120px;
            line-height: 1.5;
            font-family: inherit;
        }

        .input-area textarea:focus {
            border-color: #ff6b00;
        }

        .input-area textarea::placeholder {
            color: #555;
        }

        .send-btn {
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, #ff6b00, #ff0050);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            align-self: flex-end;
        }

        .send-btn:hover { transform: scale(1.1); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .welcome {
            text-align: center;
            color: #444;
            font-size: 13px;
            margin: auto;
            padding: 20px;
        }

        .welcome .logo { font-size: 48px; margin-bottom: 10px; }
        .welcome h3 { color: #ff6b00; font-size: 18px; margin-bottom: 6px; }
    </style>
</head>
<body>

    <header>
        <div class="avatar">🍥</div>
        <div class="header-info">
            <h2>Uzumaki AI</h2>
            <p><span class="online-dot"></span>Online • Diciptakan oleh Manz Uzumaki</p>
        </div>
    </header>

    <div class="setup-box">
        <input type="password" id="apiKeyInput" placeholder="Masukkan Gemini API Key kamu...">
        <button onclick="saveApiKey()">Simpan</button>
    </div>
    <div class="api-status" id="apiStatus">⚠️ Masukkan API key Gemini untuk mulai chat</div>

    <div class="chat-area" id="chatArea">
        <div class="welcome">
            <div class="logo">🍥</div>
            <h3>Uzumaki AI</h3>
            <p>Asisten AI yang diciptakan oleh Manz Uzumaki.<br>Masukkan API key di atas untuk mulai!</p>
        </div>
    </div>

    <div class="input-area">
        <textarea id="msgInput" placeholder="Ketik pesan..." rows="1"
            oninput="autoResize(this)"
            onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage();}">
        </textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>

<script>
    const SYSTEM_PROMPT = `Kamu adalah Uzumaki AI, asisten kecerdasan buatan yang diciptakan oleh Manz Uzumaki. 
Kamu ramah, cerdas, dan selalu siap membantu menjawab pertanyaan apa saja.
Jika ditanya siapa kamu, jawab bahwa kamu adalah Uzumaki AI yang diciptakan oleh Manz Uzumaki.
Jangan pernah menyebut Google, Gemini, atau model AI lainnya.
Jawab dalam bahasa yang sama dengan yang digunakan pengguna.`;

    let apiKey = localStorage.getItem('uzumaki_api_key') || '';
    let chatHistory = [];
    let isLoading = false;

    if (apiKey) {
        document.getElementById('apiKeyInput').value = apiKey;
        setApiStatus(true);
    }

    function saveApiKey() {
        const key = document.getElementById('apiKeyInput').value.trim();
        if (!key) {
            document.getElementById('apiStatus').textContent = '❌ API key tidak boleh kosong!';
            document.getElementById('apiStatus').className = 'api-status err';
            return;
        }
        apiKey = key;
        localStorage.setItem('uzumaki_api_key', key);
        setApiStatus(true);
    }

    function setApiStatus(ok) {
        const el = document.getElementById('apiStatus');
        if (ok) {
            el.textContent = '✅ API key tersimpan — siap chat!';
            el.className = 'api-status ok';
        } else {
            el.textContent = '⚠️ Masukkan API key Gemini untuk mulai chat';
            el.className = 'api-status';
        }
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function addBubble(role, text) {
        const chatArea = document.getElementById('chatArea');

        const welcome = chatArea.querySelector('.welcome');
        if (welcome) welcome.remove();

        const div = document.createElement('div');
        div.className = 'bubble ' + role;

        if (role === 'ai') {
            div.innerHTML = '<div class="name-tag">🍥 Uzumaki AI</div>' + escapeHtml(text);
        } else {
            div.textContent = text;
        }

        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
        return div;
    }

    function showTyping() {
        const chatArea = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = 'typing';
        div.id = 'typingIndicator';
        div.innerHTML = '<span></span><span></span><span></span>';
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeTyping() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
    }

    function escapeHtml(text) {
        return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function sendMessage() {
        if (isLoading) return;

        if (!apiKey) {
            alert('Masukkan API key Gemini dulu ya!');
            return;
        }

        const input = document.getElementById('msgInput');
        const msg = input.value.trim();
        if (!msg) return;

        input.value = '';
        input.style.height = 'auto';

        addBubble('user', msg);
        chatHistory.push({ role: 'user', parts: [{ text: msg }] });

        isLoading = true;
        document.getElementById('sendBtn').disabled = true;
        showTyping();

        try {
            const response = await fetch(
                'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + apiKey,
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
                        contents: chatHistory
                    })
                }
            );

            const data = await response.json();

            if (!response.ok) {
                const errMsg = (data.error && data.error.message) || 'Terjadi kesalahan.';
                removeTyping();
                addBubble('ai', '❌ Error: ' + errMsg);
                return;
            }

            const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Maaf, aku tidak bisa menjawab itu.';
            removeTyping();
            addBubble('ai', reply);
            chatHistory.push({ role: 'model', parts: [{ text: reply }] });

        } catch (err) {
            removeTyping();
            addBubble('ai', '❌ Gagal terhubung: ' + err.message);
        } finally {
            isLoading = false;
            document.getElementById('sendBtn').disabled = false;
        }
    }
</script>
</body>
</html>
